<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მათემატიკა — ვექტორები</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans Georgian', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 15px; }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 5px; background: linear-gradient(135deg, #06b6d4, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 15px; }
        .app { max-width: 960px; margin: auto; display: grid; grid-template-columns: 1fr 280px; gap: 15px; }
        @media (max-width: 768px) { .app { grid-template-columns: 1fr; } }
        .canvas-wrap { background: #1e293b; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        canvas { display: block; width: 100%; height: 500px; cursor: grab; }
        .panel { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 12px; }
        .vec-group { background: #0f172a; border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .vec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        .vec-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .vec-input { display: flex; align-items: center; gap: 5px; }
        .vec-input label { font-size: 0.8rem; color: #94a3b8; width: 15px; }
        .vec-input input { width: 100%; padding: 8px; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #f8fafc; font-family: 'Courier New'; font-size: 1rem; text-align: center; outline: none; }
        .vec-input input:focus { border-color: #06b6d4; }
        .op-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .op-btn { padding: 10px; background: #0f172a; border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e2e8f0; cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: bold; transition: 0.2s; text-align: center; }
        .op-btn:hover { background: #334155; }
        .op-btn.active { background: linear-gradient(135deg, #06b6d4, #22c55e); border-color: #06b6d4; }
        .result-card { background: #0f172a; border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .result-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.8rem; }
        .result-label { color: #94a3b8; }
        .result-val { font-family: 'Courier New'; font-weight: bold; }
        .formula { background: #0f172a; border-radius: 8px; padding: 10px; font-size: 0.73rem; color: #94a3b8; line-height: 1.6; border-left: 3px solid #06b6d4; }
        .formula b { color: #67e8f9; }
        .back-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #1e293b; color: #64748b; text-decoration: none; border-radius: 8px; font-size: 0.85rem; }
        .back-btn:hover { background: #334155; color: #f8fafc; }
    </style>
</head>
<body>
    <h1>➡️ 2D ვექტორები</h1>
    <p class="subtitle">გადაათრიე ვექტორების წვერები ან შეცვალე კომპონენტები — ნახე შეკრება, გამოკლება, სკალარული ნამრავლი</p>
    <div class="app">
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <div class="panel">
            <div class="vec-group">
                <div class="vec-header"><span style="color:#ef4444;">→ A ვექტორი</span></div>
                <div class="vec-inputs">
                    <div class="vec-input"><label>x</label><input type="number" id="ax" value="3"></div>
                    <div class="vec-input"><label>y</label><input type="number" id="ay" value="4"></div>
                </div>
            </div>
            <div class="vec-group">
                <div class="vec-header"><span style="color:#3b82f6;">→ B ვექტორი</span></div>
                <div class="vec-inputs">
                    <div class="vec-input"><label>x</label><input type="number" id="bx" value="5"></div>
                    <div class="vec-input"><label>y</label><input type="number" id="by" value="-2"></div>
                </div>
            </div>
            <div style="font-weight:bold; color:#22c55e; font-size:0.85rem;">ოპერაცია</div>
            <div class="op-btns">
                <button class="op-btn active" id="op-add" onclick="setOp('add')">A + B</button>
                <button class="op-btn" id="op-sub" onclick="setOp('sub')">A − B</button>
                <button class="op-btn" id="op-dot" onclick="setOp('dot')">A · B</button>
                <button class="op-btn" id="op-cross" onclick="setOp('cross')">|A × B|</button>
            </div>
            <div style="font-weight:bold; color:#f59e0b; font-size:0.85rem;">შედეგი</div>
            <div class="result-card" id="results"></div>
            <div class="formula">
                <b>|A| = √(x²+y²)</b><br>
                <b>A+B = (Ax+Bx, Ay+By)</b><br>
                <b>A·B = Ax·Bx + Ay·By</b><br>
                <b>θ = arccos(A·B / |A|·|B|)</b>
            </div>
        </div>
    </div>
    <div style="text-align:center;"><a href="../../index.html" class="back-btn">← მთავარზე დაბრუნება</a></div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wrap = canvas.parentElement;
        let W, H, CX, CY, SCALE;

        function resize() {
            canvas.width = wrap.offsetWidth * devicePixelRatio;
            canvas.height = 500 * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
            W = wrap.offsetWidth; H = 500;
            CX = W / 2; CY = H / 2;
            SCALE = Math.min(W, H) / 20;
            draw();
        }
        resize(); window.addEventListener('resize', resize);

        let op = 'add';
        const inputs = { ax: document.getElementById('ax'), ay: document.getElementById('ay'), bx: document.getElementById('bx'), by: document.getElementById('by') };
        Object.values(inputs).forEach(inp => inp.addEventListener('input', () => draw()));

        function setOp(o) {
            op = o;
            document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('op-' + o).classList.add('active');
            draw();
        }

        let dragging = null;
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const ax = CX + getV('ax') * SCALE, ay = CY - getV('ay') * SCALE;
            const bx = CX + getV('bx') * SCALE, by = CY - getV('by') * SCALE;
            if (Math.sqrt((mx-ax)**2 + (my-ay)**2) < 15) dragging = 'a';
            else if (Math.sqrt((mx-bx)**2 + (my-by)**2) < 15) dragging = 'b';
        });
        canvas.addEventListener('mousemove', e => {
            if (!dragging) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const vx = Math.round((mx - CX) / SCALE);
            const vy = Math.round((CY - my) / SCALE);
            if (dragging === 'a') { inputs.ax.value = vx; inputs.ay.value = vy; }
            else { inputs.bx.value = vx; inputs.by.value = vy; }
            draw();
        });
        canvas.addEventListener('mouseup', () => dragging = null);
        canvas.addEventListener('mouseleave', () => dragging = null);
        // Touch
        canvas.addEventListener('touchstart', e => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY})); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); const t=e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY})); }, {passive:false});
        canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); }, {passive:false});

        function getV(id) { return parseFloat(inputs[id].value) || 0; }

        function drawArrow(fx, fy, tx, ty, color, label, lineWidth) {
            ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(tx, ty);
            ctx.strokeStyle = color; ctx.lineWidth = lineWidth || 3; ctx.stroke();
            // Arrowhead
            const angle = Math.atan2(ty - fy, tx - fx);
            const headLen = 12;
            ctx.beginPath();
            ctx.moveTo(tx, ty);
            ctx.lineTo(tx - headLen * Math.cos(angle - 0.4), ty - headLen * Math.sin(angle - 0.4));
            ctx.lineTo(tx - headLen * Math.cos(angle + 0.4), ty - headLen * Math.sin(angle + 0.4));
            ctx.closePath(); ctx.fillStyle = color; ctx.fill();
            // Label
            if (label) {
                ctx.fillStyle = color; ctx.font = 'bold 14px Courier New'; ctx.textAlign = 'center';
                const mx = (fx + tx) / 2, my = (fy + ty) / 2;
                ctx.fillText(label, mx + 15 * Math.cos(angle + Math.PI/2), my + 15 * Math.sin(angle + Math.PI/2));
            }
            // Draggable dot
            ctx.beginPath(); ctx.arc(tx, ty, 6, 0, Math.PI * 2);
            ctx.fillStyle = color; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
            for (let i = -10; i <= 10; i++) {
                ctx.beginPath(); ctx.moveTo(CX + i * SCALE, 0); ctx.lineTo(CX + i * SCALE, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, CY + i * SCALE); ctx.lineTo(W, CY + i * SCALE); ctx.stroke();
            }
            // Axes
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, CY); ctx.lineTo(W, CY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(CX, 0); ctx.lineTo(CX, H); ctx.stroke();
            ctx.fillStyle = '#64748b'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
            for (let i = -9; i <= 9; i++) {
                if (i !== 0) {
                    ctx.fillText(i, CX + i * SCALE, CY + 14);
                    ctx.fillText(i, CX - 14, CY - i * SCALE + 4);
                }
            }

            const ax = getV('ax'), ay = getV('ay'), bx = getV('bx'), by = getV('by');
            const apx = CX + ax * SCALE, apy = CY - ay * SCALE;
            const bpx = CX + bx * SCALE, bpy = CY - by * SCALE;

            // Vector A
            drawArrow(CX, CY, apx, apy, '#ef4444', 'A');
            // Vector B
            drawArrow(CX, CY, bpx, bpy, '#3b82f6', 'B');

            // Result based on operation
            const res = document.getElementById('results');
            if (op === 'add') {
                const rx = ax + bx, ry = ay + by;
                const rpx = CX + rx * SCALE, rpy = CY - ry * SCALE;
                // Parallelogram dashes
                ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(apx, apy); ctx.lineTo(rpx, rpy); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(bpx, bpy); ctx.lineTo(rpx, rpy); ctx.stroke();
                ctx.setLineDash([]);
                drawArrow(CX, CY, rpx, rpy, '#22c55e', 'A+B', 4);
                const mag = Math.sqrt(rx*rx+ry*ry);
                res.innerHTML = `
                    <div class="result-row"><span class="result-label">A+B =</span><span class="result-val" style="color:#22c55e">(${rx}, ${ry})</span></div>
                    <div class="result-row"><span class="result-label">|A+B| =</span><span class="result-val">${mag.toFixed(2)}</span></div>
                    <div class="result-row"><span class="result-label">|A| =</span><span class="result-val">${Math.sqrt(ax*ax+ay*ay).toFixed(2)}</span></div>
                    <div class="result-row"><span class="result-label">|B| =</span><span class="result-val">${Math.sqrt(bx*bx+by*by).toFixed(2)}</span></div>`;
            } else if (op === 'sub') {
                const rx = ax - bx, ry = ay - by;
                const rpx = CX + rx * SCALE, rpy = CY - ry * SCALE;
                drawArrow(bpx, bpy, apx, apy, '#f59e0b', 'A−B', 4);
                drawArrow(CX, CY, rpx, rpy, '#f59e0b', '', 2);
                res.innerHTML = `
                    <div class="result-row"><span class="result-label">A−B =</span><span class="result-val" style="color:#f59e0b">(${rx}, ${ry})</span></div>
                    <div class="result-row"><span class="result-label">|A−B| =</span><span class="result-val">${Math.sqrt(rx*rx+ry*ry).toFixed(2)}</span></div>`;
            } else if (op === 'dot') {
                const dot = ax*bx + ay*by;
                const magA = Math.sqrt(ax*ax+ay*ay), magB = Math.sqrt(bx*bx+by*by);
                const angle = (magA > 0 && magB > 0) ? Math.acos(Math.max(-1, Math.min(1, dot / (magA * magB)))) * 180 / Math.PI : 0;
                // Show angle arc
                const angA = Math.atan2(ay, ax), angB = Math.atan2(by, bx);
                ctx.beginPath(); ctx.arc(CX, CY, SCALE*1.5, -angA, -angB, angA > angB);
                ctx.strokeStyle = '#ec4899'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#ec4899'; ctx.font = 'bold 12px Courier New'; ctx.textAlign = 'center';
                ctx.fillText(`${angle.toFixed(1)}°`, CX + SCALE*2*Math.cos(-(angA+angB)/2), CY + SCALE*2*Math.sin(-(angA+angB)/2));
                res.innerHTML = `
                    <div class="result-row"><span class="result-label">A · B =</span><span class="result-val" style="color:#ec4899">${dot}</span></div>
                    <div class="result-row"><span class="result-label">კუთხე (θ) =</span><span class="result-val" style="color:#ec4899">${angle.toFixed(2)}°</span></div>
                    <div class="result-row"><span class="result-label">⊥ პერპენდიკულარი?</span><span class="result-val">${dot===0?'✅ დიახ':'❌ არა'}</span></div>`;
            } else if (op === 'cross') {
                const cross = ax*by - ay*bx;
                // Shade parallelogram
                ctx.beginPath(); ctx.moveTo(CX,CY); ctx.lineTo(apx,apy); ctx.lineTo(apx+(bpx-CX),apy+(bpy-CY)); ctx.lineTo(bpx,bpy); ctx.closePath();
                ctx.fillStyle = 'rgba(168,85,247,0.15)'; ctx.fill();
                ctx.strokeStyle = 'rgba(168,85,247,0.5)'; ctx.lineWidth = 1; ctx.stroke();
                res.innerHTML = `
                    <div class="result-row"><span class="result-label">|A × B| =</span><span class="result-val" style="color:#a855f7">${Math.abs(cross)}</span></div>
                    <div class="result-row"><span class="result-label">= პარალელოგრამის ფართობი</span></div>
                    <div class="result-row"><span class="result-label">მიმართულება</span><span class="result-val">${cross>0?'⬆ z+':'⬇ z−'}</span></div>`;
            }
        }
        draw();
    </script>
</body>
</html>
