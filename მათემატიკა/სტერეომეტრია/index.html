<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>მათემატიკა — სტერეომეტრია</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Georgian',sans-serif!important;background:#0a0e17!important;color:#e0e6f0;min-height:100vh;display:flex!important;flex-direction:column!important}
.u-header{display:flex;align-items:center;gap:15px;padding:10px 20px;background:#111827;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.u-back{color:#7a84a0;text-decoration:none;font-size:.82rem;padding:5px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;transition:.2s;white-space:nowrap}
.u-back:hover{background:rgba(255,255,255,.12);color:#e0e6f0}
.u-header h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.u-body{flex:1;display:flex;justify-content:center;padding:15px}
.u-card{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;width:100%;max-width:1000px;box-shadow:0 4px 30px rgba(0,0,0,.4)}
.u-card .container,.u-card .app{max-width:none;margin:0;padding:0}
.u-card canvas{display:block}
.u-card .simulation-area,.u-card .sim-area{min-height:300px}</style>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }
        
        
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 15px; }
        .app { max-width: 960px; margin: auto; display: grid; grid-template-columns: 1fr 260px; gap: 15px; }
        @media (max-width: 768px) { .app { grid-template-columns: 1fr; } }
        .canvas-wrap { background: #1e293b; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        canvas { display: block; width: 100%; height: 500px; cursor: grab; }
        .panel { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
        .shape-btn { padding: 10px; background: #0f172a; border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; color: #94a3b8; cursor: pointer; font-family: inherit; font-size: 0.85rem; transition: 0.2s; text-align: left; display: flex; align-items: center; gap: 8px; }
        .shape-btn:hover { background: #334155; }
        .shape-btn.active { background: linear-gradient(135deg, #f97316, #a855f7); color: white; border-color: #f97316; }
        .control label { font-size: 0.8rem; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .control label b { color: #f8fafc; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #0f172a; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #f97316, #a855f7); cursor: pointer; }
        .result-card { background: #0f172a; border-radius: 8px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .r-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.8rem; }
        .r-label { color: #94a3b8; }
        .r-val { font-family: 'Courier New'; font-weight: bold; color: #f8fafc; }
        .formula-box { background: #0f172a; border-left: 3px solid #a855f7; border-radius: 8px; padding: 10px; font-size: 0.73rem; color: #94a3b8; line-height: 1.6; }
        .formula-box b { color: #c084fc; }
        .check-row { display: flex; align-items: center; gap: 8px; }
        .check-row label { font-size: 0.8rem; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 5px; }</style>
</head>
<body>
<div class="u-header">
<a href="../../index.html" class="u-back">← მთავარზე</a>
<h1>მათემატიკა — სტერეომეტრია</h1>
</div>
<div class="u-body">
<div class="u-card">
<div class="app">
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <div class="panel">
            <div style="font-weight:bold; color:#f97316; font-size:0.9rem;">ფიგურა</div>
            <button class="shape-btn active" onclick="setShape('cube')">🧊 კუბი</button>
            <button class="shape-btn" onclick="setShape('prism')">📦 პრიზმა</button>
            <button class="shape-btn" onclick="setShape('pyramid')">🔺 პირამიდა</button>
            <button class="shape-btn" onclick="setShape('cylinder')">🫙 ცილინდრი</button>
            <button class="shape-btn" onclick="setShape('cone')">🍦 კონუსი</button>
            <button class="shape-btn" onclick="setShape('sphere')">🔵 სფერო</button>
            <div class="control">
                <label>ზომა: <b><span id="size-val">100</span></b></label>
                <input type="range" id="size" min="40" max="180" value="100" oninput="document.getElementById('size-val').textContent=this.value; updateCalc();">
            </div>
            <div class="check-row">
                <label><input type="checkbox" id="show-edges" checked onchange="updateCalc()"> წიბოები</label>
                <label><input type="checkbox" id="show-faces" checked onchange="updateCalc()"> ზედაპირი</label>
                <label><input type="checkbox" id="auto-rotate" checked> ავტო-ბრუნვა</label>
            </div>
            <div style="font-weight:bold; color:#a855f7; font-size:0.9rem; margin-top:5px;">📏 გაზომვები</div>
            <div class="result-card" id="calcs"></div>
            <div class="formula-box" id="formulas"></div>
        </div>
    </div>
    <div style="text-align:center;"></div>
</div>
</div>
<script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wrap = canvas.parentElement;
        let W, H;
        function resize() {
            canvas.width = wrap.offsetWidth * devicePixelRatio;
            canvas.height = 500 * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
            W = wrap.offsetWidth; H = 500;
        }
        resize(); window.addEventListener('resize', resize);

        let shape = 'cube';
        let rotX = 0.4, rotY = 0.6;
        let dragging = false, lastMX, lastMY;

        canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
        canvas.addEventListener('mousemove', e => {
            if(!dragging) return;
            rotY += (e.clientX - lastMX) * 0.01;
            rotX += (e.clientY - lastMY) * 0.01;
            lastMX = e.clientX; lastMY = e.clientY;
        });
        canvas.addEventListener('mouseup', () => dragging = false);
        canvas.addEventListener('mouseleave', () => dragging = false);
        // Touch
        canvas.addEventListener('touchstart', e => { dragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchmove', e => { if(!dragging) return; rotY += (e.touches[0].clientX-lastMX)*0.01; rotX += (e.touches[0].clientY-lastMY)*0.01; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchend', () => dragging = false);

        function setShape(s) {
            shape = s;
            document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
            event.target.classList.add('active');
            updateCalc();
        }

        function project(x3, y3, z3) {
            // Rotate Y
            let x = x3*Math.cos(rotY) - z3*Math.sin(rotY);
            let z = x3*Math.sin(rotY) + z3*Math.cos(rotY);
            // Rotate X
            let y = y3*Math.cos(rotX) - z*Math.sin(rotX);
            z = y3*Math.sin(rotX) + z*Math.cos(rotX);
            const f = 500 / (500 + z);
            return { x: W/2 + x*f, y: H/2 + y*f, z };
        }

        function updateCalc() {
            const a = +document.getElementById('size').value;
            const calcs = document.getElementById('calcs');
            const formulas = document.getElementById('formulas');
            let html = '', fhtml = '';
            if(shape==='cube'){
                const V=a**3, S=6*a**2, d=a*Math.sqrt(3);
                html=`<div class="r-row"><span class="r-label">წიბო (a)</span><span class="r-val">${a}</span></div>
                    <div class="r-row"><span class="r-label">მოცულობა (V)</span><span class="r-val" style="color:#22c55e">${V.toLocaleString()}</span></div>
                    <div class="r-row"><span class="r-label">ზედაპირი (S)</span><span class="r-val" style="color:#3b82f6">${S.toLocaleString()}</span></div>
                    <div class="r-row"><span class="r-label">დიაგონალი (d)</span><span class="r-val" style="color:#f59e0b">${d.toFixed(1)}</span></div>`;
                fhtml=`<b>V = a³</b> = ${a}³ = ${V}<br><b>S = 6a²</b> = 6·${a}² = ${S}<br><b>d = a√3</b> = ${d.toFixed(2)}`;
            } else if(shape==='prism'){
                const b=a, h=a*1.5;
                const V=b*b*h, S=2*b*b+4*b*h;
                html=`<div class="r-row"><span class="r-label">ფუძე (a)</span><span class="r-val">${b}</span></div>
                    <div class="r-row"><span class="r-label">სიმაღლე (h)</span><span class="r-val">${h.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">მოცულობა</span><span class="r-val" style="color:#22c55e">${V.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">ზედაპირი</span><span class="r-val" style="color:#3b82f6">${S.toFixed(0)}</span></div>`;
                fhtml=`<b>V = a²·h</b><br><b>S = 2a² + 4ah</b>`;
            } else if(shape==='pyramid'){
                const h=a*1.2;
                const V=a*a*h/3, l=Math.sqrt((a/2)**2+h**2), S=a*a+2*a*l;
                html=`<div class="r-row"><span class="r-label">ფუძის წიბო</span><span class="r-val">${a}</span></div>
                    <div class="r-row"><span class="r-label">სიმაღლე</span><span class="r-val">${h.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">მოცულობა</span><span class="r-val" style="color:#22c55e">${V.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">აპოთემა</span><span class="r-val" style="color:#f59e0b">${l.toFixed(1)}</span></div>`;
                fhtml=`<b>V = ⅓·a²·h</b><br><b>S = a² + 2a·l</b>`;
            } else if(shape==='cylinder'){
                const r=a/2, h=a*1.3;
                const V=Math.PI*r*r*h, S=2*Math.PI*r*(r+h);
                html=`<div class="r-row"><span class="r-label">რადიუსი</span><span class="r-val">${r.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">სიმაღლე</span><span class="r-val">${h.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">მოცულობა</span><span class="r-val" style="color:#22c55e">${V.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">ზედაპირი</span><span class="r-val" style="color:#3b82f6">${S.toFixed(0)}</span></div>`;
                fhtml=`<b>V = πr²h</b><br><b>S = 2πr(r+h)</b>`;
            } else if(shape==='cone'){
                const r=a/2, h=a*1.3;
                const l=Math.sqrt(r*r+h*h), V=Math.PI*r*r*h/3, S=Math.PI*r*(r+l);
                html=`<div class="r-row"><span class="r-label">რადიუსი</span><span class="r-val">${r.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">სიმაღლე</span><span class="r-val">${h.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">მოცულობა</span><span class="r-val" style="color:#22c55e">${V.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">ზარმაცა (l)</span><span class="r-val" style="color:#f59e0b">${l.toFixed(1)}</span></div>`;
                fhtml=`<b>V = ⅓πr²h</b><br><b>l = √(r²+h²)</b><br><b>S = πr(r+l)</b>`;
            } else {
                const r=a/2;
                const V=4/3*Math.PI*r**3, S=4*Math.PI*r*r;
                html=`<div class="r-row"><span class="r-label">რადიუსი</span><span class="r-val">${r.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">მოცულობა</span><span class="r-val" style="color:#22c55e">${V.toFixed(0)}</span></div>
                    <div class="r-row"><span class="r-label">ზედაპირი</span><span class="r-val" style="color:#3b82f6">${S.toFixed(0)}</span></div>`;
                fhtml=`<b>V = 4/3·πr³</b><br><b>S = 4πr²</b>`;
            }
            calcs.innerHTML = html;
            formulas.innerHTML = fhtml;
        }

        function getVertices(a) {
            const s = a/2;
            if(shape==='cube') {
                return { verts:[[-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],[-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s]],
                    edges:[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]],
                    faces:[[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[0,3,7,4],[1,2,6,5]] };
            } else if(shape==='prism') {
                const h=a*0.75;
                return { verts:[[-s,-h,-s],[s,-h,-s],[s,-h,s],[-s,-h,s],[-s,h,-s],[s,h,-s],[s,h,s],[-s,h,s]],
                    edges:[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]],
                    faces:[[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[0,3,7,4],[1,2,6,5]] };
            } else if(shape==='pyramid') {
                const h=a*0.6;
                return { verts:[[-s,-h,-s],[s,-h,-s],[s,-h,s],[-s,-h,s],[0,h,0]],
                    edges:[[0,1],[1,2],[2,3],[3,0],[0,4],[1,4],[2,4],[3,4]],
                    faces:[[0,1,2,3],[0,1,4],[1,2,4],[2,3,4],[3,0,4]] };
            } else if(shape==='cylinder' || shape==='cone') {
                const seg=20, r=s, h=a*0.65;
                const verts=[], edges=[], faces=[];
                for(let i=0;i<seg;i++) {
                    const ang=i/seg*Math.PI*2;
                    verts.push([r*Math.cos(ang),-h,r*Math.sin(ang)]);
                    if(shape==='cylinder') verts.push([r*Math.cos(ang),h,r*Math.sin(ang)]);
                }
                if(shape==='cone') verts.push([0,h,0]);
                for(let i=0;i<seg;i++) {
                    const ni=(i+1)%seg;
                    if(shape==='cylinder') {
                        edges.push([i*2,ni*2]); edges.push([i*2+1,ni*2+1]); edges.push([i*2,i*2+1]);
                    } else {
                        edges.push([i,ni]); edges.push([i,seg]);
                    }
                }
                return {verts, edges, faces:[]};
            } else { // sphere
                const seg=16, rings=12, r=s;
                const verts=[], edges=[];
                for(let j=0;j<=rings;j++) {
                    const phi=j/rings*Math.PI;
                    for(let i=0;i<seg;i++) {
                        const theta=i/seg*Math.PI*2;
                        verts.push([r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta)]);
                        if(i>0) edges.push([verts.length-1, verts.length-2]);
                        if(j>0) edges.push([verts.length-1, verts.length-1-seg]);
                    }
                    edges.push([j*seg, (j+1)*seg-1]);
                }
                return {verts, edges, faces:[]};
            }
        }

        function draw() {
            ctx.clearRect(0,0,W,H);
            if(document.getElementById('auto-rotate').checked && !dragging) { rotY += 0.008; }

            const a = +document.getElementById('size').value;
            const {verts, edges, faces} = getVertices(a);
            const showEdges = document.getElementById('show-edges').checked;
            const showFaces = document.getElementById('show-faces').checked;

            const projected = verts.map(v => project(v[0], v[1], v[2]));

            // Draw faces
            if(showFaces && faces.length > 0) {
                const faceColors = ['rgba(249,115,22,0.12)','rgba(168,85,247,0.12)','rgba(34,197,94,0.12)','rgba(59,130,246,0.12)','rgba(236,72,153,0.12)','rgba(6,182,212,0.12)'];
                // Sort faces by avg z
                const sortedFaces = faces.map((f,i)=>({f,i,z:f.reduce((s,vi)=>s+projected[vi].z,0)/f.length})).sort((a,b)=>b.z-a.z);
                sortedFaces.forEach(({f,i})=>{
                    ctx.beginPath(); f.forEach((vi,j)=>{j===0?ctx.moveTo(projected[vi].x,projected[vi].y):ctx.lineTo(projected[vi].x,projected[vi].y);});
                    ctx.closePath(); ctx.fillStyle=faceColors[i%faceColors.length]; ctx.fill();
                });
            }

            // Draw edges
            if(showEdges) {
                ctx.strokeStyle = '#f97316'; ctx.lineWidth = 1.5;
                edges.forEach(([a,b]) => {
                    if(a < projected.length && b < projected.length) {
                        ctx.beginPath(); ctx.moveTo(projected[a].x, projected[a].y); ctx.lineTo(projected[b].x, projected[b].y); ctx.stroke();
                    }
                });
            }

            // Draw vertices
            projected.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2);
                ctx.fillStyle = '#a855f7'; ctx.fill();
            });

            requestAnimationFrame(draw);
        }
        updateCalc();
        draw();
    </script>
</body>
</html>
