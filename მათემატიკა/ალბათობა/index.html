<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მათემატიკა — ალბათობა</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans Georgian', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 15px; }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 5px; background: linear-gradient(135deg, #f59e0b, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 15px; }
        .app { max-width: 800px; margin: auto; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; background: #1e293b; border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; color: #94a3b8; cursor: pointer; text-align: center; font-family: inherit; font-size: 0.9rem; font-weight: bold; transition: 0.2s; }
        .tab.active { background: linear-gradient(135deg, #f59e0b, #22c55e); color: white; border-color: #f59e0b; }
        .card { background: #1e293b; border-radius: 16px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .exp-area { display: flex; justify-content: center; align-items: center; min-height: 200px; gap: 20px; flex-wrap: wrap; }
        .die { width: 90px; height: 90px; background: #f8fafc; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); user-select: none; }
        .die:hover { transform: scale(1.1); }
        .die.rolling { animation: rollDie 0.5s ease-out; }
        @keyframes rollDie { 0% { transform: rotate(0deg) scale(0.8); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        .coin { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; transition: 0.3s; user-select: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .coin-heads { background: linear-gradient(135deg, #f59e0b, #eab308); }
        .coin-tails { background: linear-gradient(135deg, #94a3b8, #6b7280); }
        .coin:hover { transform: scale(1.1); }
        .coin.flipping { animation: flipCoin 0.6s ease-out; }
        @keyframes flipCoin { 0% { transform: rotateY(0) scale(0.8); } 50% { transform: rotateY(180deg) scale(1.1); } 100% { transform: rotateY(360deg) scale(1); } }
        .controls { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 0.9rem; color: white; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-roll { background: linear-gradient(135deg, #f59e0b, #ef4444); box-shadow: 0 4px 15px rgba(245,158,11,0.3); }
        .btn-multi { background: #334155; font-size: 0.8rem; }
        .btn-reset { background: #ef4444; font-size: 0.8rem; }
        .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .stat-item { background: #0f172a; border-radius: 8px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item .lbl { font-size: 0.75rem; color: #94a3b8; }
        .stat-item .val { font-size: 1.2rem; font-weight: bold; font-family: 'Courier New'; margin-top: 3px; }
        .freq-chart { display: flex; align-items: flex-end; gap: 5px; height: 130px; background: #0f172a; border-radius: 8px; padding: 10px 15px; border: 1px solid rgba(255,255,255,0.05); margin-top: 15px; }
        .freq-bar { flex: 1; background: linear-gradient(180deg, #f59e0b, #e17c00); border-radius: 4px 4px 0 0; position: relative; transition: height 0.3s; min-height: 2px; }
        .freq-bar .bar-lbl { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #94a3b8; }
        .freq-bar .bar-count { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #f8fafc; font-weight: bold; }
        .theory { background: #0f172a; border-left: 3px solid #22c55e; border-radius: 8px; padding: 12px; font-size: 0.8rem; color: #94a3b8; line-height: 1.6; margin-top: 15px; }
        .theory b { color: #86efac; }
        .back-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #1e293b; color: #64748b; text-decoration: none; border-radius: 8px; font-size: 0.85rem; }
        .back-btn:hover { background: #334155; color: #f8fafc; }
    </style>
</head>
<body>
    <h1>🎲 ალბათობის ექსპერიმენტები</h1>
    <p class="subtitle">აგორე კამათელი ან ბრუნდე მონეტას — შეადარე თეორიული და ექსპერიმენტული ალბათობები!</p>
    <div class="app">
        <div class="tabs">
            <button class="tab active" onclick="setMode('dice')">🎲 კამათელი</button>
            <button class="tab" onclick="setMode('coin')">🪙 მონეტა</button>
            <button class="tab" onclick="setMode('two-dice')">🎲🎲 ორი კამათელი</button>
        </div>
        <div class="card">
            <div class="exp-area" id="exp-area"></div>
            <div class="controls">
                <button class="btn btn-roll" onclick="doExperiment()">🎲 ექსპერიმენტი!</button>
                <button class="btn btn-multi" onclick="doMany(10)">×10</button>
                <button class="btn btn-multi" onclick="doMany(100)">×100</button>
                <button class="btn btn-multi" onclick="doMany(1000)">×1000</button>
                <button class="btn btn-reset" onclick="resetExp()">↺ განულება</button>
            </div>
            <div class="stats" id="stats"></div>
            <div class="freq-chart" id="freq-chart"></div>
            <div class="theory" id="theory"></div>
        </div>
    </div>
    <div style="text-align:center;"><a href="../../index.html" class="back-btn">← მთავარზე დაბრუნება</a></div>
    <script>
        let mode = 'dice';
        let results = [];
        const dieFaces = ['⚀','⚁','⚂','⚃','⚄','⚅'];

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            resetExp();
        }

        function resetExp() {
            results = [];
            updateDisplay();
            buildUI();
        }

        function buildUI() {
            const area = document.getElementById('exp-area');
            if (mode === 'dice') {
                area.innerHTML = '<div class="die" id="die1" onclick="doExperiment()">⚀</div>';
                document.getElementById('theory').innerHTML = '<b>თეორია:</b> თითოეული გვერდის ალბათობა = <b>1/6 ≈ 16.67%</b><br>P(ლუწი) = P(კენტი) = 3/6 = <b>50%</b>';
            } else if (mode === 'coin') {
                area.innerHTML = '<div class="coin coin-heads" id="coin1" onclick="doExperiment()">👑</div>';
                document.getElementById('theory').innerHTML = '<b>თეორია:</b> P(ავერსი) = P(რევერსი) = <b>1/2 = 50%</b><br>ბევრ ცდაში % ახლოვდება 50%-ს (დიდი რიცხვების კანონი)';
            } else {
                area.innerHTML = '<div class="die" id="die1" onclick="doExperiment()">⚀</div><span style="font-size:2rem;color:#64748b;">+</span><div class="die" id="die2" onclick="doExperiment()">⚁</div>';
                document.getElementById('theory').innerHTML = '<b>თეორია:</b> ორი კამათელის ჯამის ყველაზე სავარაუდო შედეგი = <b>7</b> (P=6/36≈16.7%)<br>min=2, max=12. ჯამი 7 — 6 კომბინაცია: (1,6),(2,5),(3,4),(4,3),(5,2),(6,1)';
            }
        }

        function rollDie() { return Math.floor(Math.random() * 6) + 1; }
        function flipCoin() { return Math.random() < 0.5 ? 'H' : 'T'; }

        function doExperiment() {
            let result;
            if (mode === 'dice') {
                result = rollDie();
                const el = document.getElementById('die1');
                el.textContent = dieFaces[result - 1];
                el.classList.remove('rolling'); void el.offsetWidth; el.classList.add('rolling');
            } else if (mode === 'coin') {
                result = flipCoin();
                const el = document.getElementById('coin1');
                el.textContent = result === 'H' ? '👑' : '🔢';
                el.className = 'coin ' + (result === 'H' ? 'coin-heads' : 'coin-tails');
                el.classList.add('flipping');
                setTimeout(() => el.classList.remove('flipping'), 600);
            } else {
                const d1 = rollDie(), d2 = rollDie();
                result = d1 + d2;
                const el1 = document.getElementById('die1'), el2 = document.getElementById('die2');
                el1.textContent = dieFaces[d1 - 1]; el2.textContent = dieFaces[d2 - 1];
                el1.classList.remove('rolling'); el2.classList.remove('rolling');
                void el1.offsetWidth;
                el1.classList.add('rolling'); el2.classList.add('rolling');
            }
            results.push(result);
            updateDisplay();
        }

        function doMany(n) {
            for (let i = 0; i < n; i++) {
                if (mode === 'dice') results.push(rollDie());
                else if (mode === 'coin') results.push(flipCoin());
                else results.push(rollDie() + rollDie());
            }
            updateDisplay();
        }

        function updateDisplay() {
            const total = results.length;
            const stats = document.getElementById('stats');
            const chart = document.getElementById('freq-chart');

            if (total === 0) {
                stats.innerHTML = '<div class="stat-item"><div class="lbl">სულ ცდა</div><div class="val">0</div></div>';
                chart.innerHTML = '';
                return;
            }

            if (mode === 'dice') {
                const freq = [0, 0, 0, 0, 0, 0];
                results.forEach(r => freq[r - 1]++);
                const maxF = Math.max(...freq, 1);
                stats.innerHTML = `
                    <div class="stat-item"><div class="lbl">სულ ცდა</div><div class="val" style="color:#f59e0b">${total}</div></div>
                    <div class="stat-item"><div class="lbl">ლუწი (2,4,6)</div><div class="val" style="color:#22c55e">${((results.filter(r=>r%2===0).length/total)*100).toFixed(1)}%</div></div>
                    <div class="stat-item"><div class="lbl">კენტი (1,3,5)</div><div class="val" style="color:#3b82f6">${((results.filter(r=>r%2===1).length/total)*100).toFixed(1)}%</div></div>
                `;
                chart.innerHTML = freq.map((f, i) => {
                    const pct = (f / maxF) * 100;
                    const expPct = (1/6*100).toFixed(1);
                    const actPct = total > 0 ? (f/total*100).toFixed(1) : 0;
                    return `<div class="freq-bar" style="height:${pct}%;background:${['#ef4444','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#ec4899'][i]}"><span class="bar-count">${f} (${actPct}%)</span><span class="bar-lbl">${i + 1}</span></div>`;
                }).join('');
            } else if (mode === 'coin') {
                const heads = results.filter(r => r === 'H').length;
                const tails = total - heads;
                stats.innerHTML = `
                    <div class="stat-item"><div class="lbl">სულ ცდა</div><div class="val" style="color:#f59e0b">${total}</div></div>
                    <div class="stat-item"><div class="lbl">👑 ავერსი</div><div class="val" style="color:#eab308">${heads} (${(heads/total*100).toFixed(1)}%)</div></div>
                    <div class="stat-item"><div class="lbl">🔢 რევერსი</div><div class="val" style="color:#94a3b8">${tails} (${(tails/total*100).toFixed(1)}%)</div></div>
                `;
                const maxF = Math.max(heads, tails, 1);
                chart.innerHTML = `
                    <div class="freq-bar" style="height:${(heads/maxF)*100}%;background:#eab308"><span class="bar-count">${heads}</span><span class="bar-lbl">ავერსი</span></div>
                    <div class="freq-bar" style="height:${(tails/maxF)*100}%;background:#6b7280"><span class="bar-count">${tails}</span><span class="bar-lbl">რევერსი</span></div>
                `;
            } else {
                const freq = new Array(11).fill(0); // 2..12
                results.forEach(r => freq[r - 2]++);
                const maxF = Math.max(...freq, 1);
                const mostCommon = freq.indexOf(Math.max(...freq)) + 2;
                stats.innerHTML = `
                    <div class="stat-item"><div class="lbl">სულ ცდა</div><div class="val" style="color:#f59e0b">${total}</div></div>
                    <div class="stat-item"><div class="lbl">ყველაზე ხშირი</div><div class="val" style="color:#22c55e">${mostCommon}</div></div>
                    <div class="stat-item"><div class="lbl">საშუალო</div><div class="val">${(results.reduce((a,b)=>a+b,0)/total).toFixed(2)}</div></div>
                `;
                chart.innerHTML = freq.map((f, i) => {
                    const pct = (f / maxF) * 100;
                    return `<div class="freq-bar" style="height:${pct}%;background:${['#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6'][i]}"><span class="bar-count">${f}</span><span class="bar-lbl">${i + 2}</span></div>`;
                }).join('');
            }
        }

        buildUI();
        updateDisplay();
    </script>
</body>
</html>
