<style>* { margin: 0; padding: 0; box-sizing: border-box; }
        
        
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 15px; }
        .app { max-width: 960px; margin: auto; display: grid; grid-template-columns: 1fr 240px; gap: 15px; }
        @media (max-width: 768px) { .app { grid-template-columns: 1fr; } }
        .canvas-wrap { background: #000; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        canvas { display: block; width: 100%; height: 500px; cursor: crosshair; }
        .panel { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
        .panel h3 { font-size: 0.9rem; }
        .frac-btn { padding: 10px; background: #0f172a; border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; color: #94a3b8; cursor: pointer; font-family: inherit; font-size: 0.8rem; transition: 0.2s; text-align: left; }
        .frac-btn:hover { background: #334155; }
        .frac-btn.active { background: linear-gradient(135deg, #ec4899, #06b6d4); color: white; border-color: #ec4899; }
        .control label { font-size: 0.8rem; color: #94a3b8; display: flex; justify-content: space-between; margin-bottom: 4px; }

        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #ec4899, #06b6d4); cursor: pointer; }

        .color-choice.active { border-color: #fff; }
        button.draw-btn { padding: 12px; background: linear-gradient(135deg, #ec4899, #8b5cf6); border: none; border-radius: 8px; color: white; font-family: inherit; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        button.draw-btn:hover { transform: translateY(-2px); }

        .info b { color: #f9a8d4; }</style>

<body>
<div class="u-header">
<a href="../../index.html" class="u-back">← მთავარზე</a>
<h1>მათემატიკა — ფრაქტალები</h1>
</div>
<div class="u-body">
<div class="u-card">
<div class="app">
        <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
        <div class="panel">
            <h3 style="color:#ec4899;">ფრაქტალის ტიპი</h3>
            <button class="frac-btn active" id="fb-mandelbrot" onclick="setFractal('mandelbrot')">🌀 მანდელბროტი</button>
            <button class="frac-btn" id="fb-julia" onclick="setFractal('julia')">🎨 ჟულია</button>
            <button class="frac-btn" id="fb-koch" onclick="setFractal('koch')">❄️ კოხის ფიფქი</button>
            <button class="frac-btn" id="fb-sierpinski" onclick="setFractal('sierpinski')">🔺 სიერპინსკის სამკუთხედი</button>
            <button class="frac-btn" id="fb-tree" onclick="setFractal('tree')">🌳 ფრაქტალური ხე</button>
            <div class="control">
                <label>იტერაციები: <b><span id="iter-val">50</span></b></label>
                <input type="range" id="iterations" min="10" max="200" value="50">
            </div>
            <div class="control" id="depth-ctrl">
                <label>სიღრმე: <b><span id="depth-val">5</span></b></label>
                <input type="range" id="depth" min="1" max="10" value="5">
            </div>
            <div class="control" id="angle-ctrl" style="display:none;">
                <label>ტოტის კუთხე: <b><span id="angle-val">25</span>°</b></label>
                <input type="range" id="branch-angle" min="5" max="60" value="25">
            </div>
            <h3 style="color:#06b6d4;">ფერის სქემა</h3>
            <div class="color-btns" id="color-btns"></div>
            <button class="draw-btn" onclick="generate()">🎨 დახაზვა</button>
            <div class="info" id="fractal-info">
                <b>მანდელბროტი:</b> z = z² + c რეკურსია კომპლექსურ სიბრტყეში. თვით-მსგავსი სტრუქტურა — ზუმის ნებისმიერ დონეზე ახალ დეტალებს ხედავ.
            </div>
        </div>
    </div>
    <div style="text-align:center;"></div>
</div>
</div>
<script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wrap = canvas.parentElement;
        let W, H;
        function resize() {
            canvas.width = wrap.offsetWidth * devicePixelRatio;
            canvas.height = 500 * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
            W = wrap.offsetWidth; H = 500;
        }
        resize(); window.addEventListener('resize', () => { resize(); generate(); });

        const colorSchemes = [
            { name: 'ცისარტყელა', fn: (t) => `hsl(${t*360}, 80%, 55%)` },
            { name: 'ცეცხლი', fn: (t) => `hsl(${t*60}, 90%, ${t*60+10}%)` },
            { name: 'ოკეანე', fn: (t) => `hsl(${200+t*40}, 80%, ${t*60+10}%)` },
            { name: 'იისფერი', fn: (t) => `hsl(${270+t*30}, 80%, ${t*50+20}%)` },
            { name: 'შავ-თეთრი', fn: (t) => `rgb(${t*255},${t*255},${t*255})` },
        ];
        let colorScheme = 0;
        const colorBtns = document.getElementById('color-btns');
        const sampleColors = ['linear-gradient(90deg,red,orange,yellow,green,blue,violet)','linear-gradient(90deg,#1a0000,#ff3300,#ff9900)','linear-gradient(90deg,#001133,#0066ff,#00ccff)','linear-gradient(90deg,#1a0044,#8833ff,#cc66ff)','linear-gradient(90deg,#000,#fff)'];
        sampleColors.forEach((bg, i) => {
            const d = document.createElement('div');
            d.className = 'color-choice' + (i===0?' active':'');
            d.style.background = bg; d.style.width = '40px';
            d.onclick = () => { colorScheme = i; document.querySelectorAll('.color-choice').forEach(x=>x.classList.remove('active')); d.classList.add('active'); generate(); };
            colorBtns.appendChild(d);
        });

        let fractal = 'mandelbrot';
        const iterSlider = document.getElementById('iterations');
        const depthSlider = document.getElementById('depth');
        const angleSlider = document.getElementById('branch-angle');
        iterSlider.oninput = () => document.getElementById('iter-val').textContent = iterSlider.value;
        depthSlider.oninput = () => { document.getElementById('depth-val').textContent = depthSlider.value; generate(); };
        angleSlider.oninput = () => { document.getElementById('angle-val').textContent = angleSlider.value; generate(); };

        const descriptions = {
            mandelbrot: '<b>მანდელბროტი:</b> z = z² + c რეკურსია კომპლექსურ სიბრტყეში. თვით-მსგავსი — ზუმის ნებისმიერ დონეზე ახალ დეტალებს ხედავ. 1980 წელს აღმოაჩინა ბენუა მანდელბროტმა.',
            julia: '<b>ჟულიას სიმრავლე:</b> მანდელბროტის „ბიძაშვილი". ფიქსირებული c-სთვის z = z² + c. ყველა c-ს განსხვავებული ფორმა შეესაბამება.',
            koch: '<b>კოხის ფიფქი:</b> ხაზს ყოფ 3 ნაწილად, შუა ნაწილს სამკუთხედით ცვლი. უსასრულო პერიმეტრი, სასრული ფართობი! ფრაქტალური განზომილება ≈ 1.26.',
            sierpinski: '<b>სიერპინსკის სამკუთხედი:</b> სამკუთხედიდან შუა სამკუთხედს ამოჭრი, დანარჩენ 3-ზე მეორდება. ფრაქტალური განზომილება ≈ 1.585.',
            tree: '<b>ფრაქტალური ხე:</b> ტოტი ორ ახალ ტოტად იყოფა — ბუნებაში გავრცელებული სტრუქტურა. ტოტის კუთხით სხვადასხვა ფორმა მიიღება.'
        };

        function setFractal(f) {
            fractal = f;
            document.querySelectorAll('.frac-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('fb-'+f).classList.add('active');
            document.getElementById('fractal-info').innerHTML = descriptions[f];
            const isMandel = f==='mandelbrot' || f==='julia';
            document.getElementById('depth-ctrl').style.display = isMandel ? 'none' : 'block';
            document.getElementById('angle-ctrl').style.display = f==='tree' ? 'block' : 'none';
            generate();
        }

        function generate() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
            const maxIter = +iterSlider.value;
            const depth = +depthSlider.value;
            const colFn = colorSchemes[colorScheme].fn;

            if (fractal === 'mandelbrot' || fractal === 'julia') {
                const imgData = ctx.createImageData(W, H);
                const cJulia = { r: -0.7, i: 0.27015 };
                for (let px = 0; px < W; px++) {
                    for (let py = 0; py < H; py++) {
                        let zr, zi, cr, ci;
                        if (fractal === 'mandelbrot') {
                            cr = (px / W) * 3.5 - 2.5; ci = (py / H) * 2.4 - 1.2;
                            zr = 0; zi = 0;
                        } else {
                            zr = (px / W) * 3.5 - 1.75; zi = (py / H) * 2.4 - 1.2;
                            cr = cJulia.r; ci = cJulia.i;
                        }
                        let iter = 0;
                        while (zr*zr + zi*zi < 4 && iter < maxIter) {
                            const tmp = zr*zr - zi*zi + cr;
                            zi = 2*zr*zi + ci;
                            zr = tmp;
                            iter++;
                        }
                        const idx = (py * W + px) * 4;
                        if (iter === maxIter) {
                            imgData.data[idx] = imgData.data[idx+1] = imgData.data[idx+2] = 0;
                        } else {
                            const t = iter / maxIter;
                            const hue = t * 360;
                            const [r, g, b] = hslToRgb(colorScheme===0?t*360: colorScheme===1?t*60: colorScheme===2?200+t*40: colorScheme===3?270+t*30:0, colorScheme===4?0:80, colorScheme===4?t*100:t*60+10);
                            imgData.data[idx] = r; imgData.data[idx+1] = g; imgData.data[idx+2] = b;
                        }
                        imgData.data[idx+3] = 255;
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            } else if (fractal === 'koch') {
                ctx.strokeStyle = colFn(0.5); ctx.lineWidth = 1.5;
                const s = W * 0.7;
                const h = s * Math.sin(Math.PI/3);
                const x0 = W/2 - s/2, y0 = H/2 + h/3;
                kochLine(x0, y0, x0+s, y0, depth);
                kochLine(x0+s, y0, x0+s/2, y0-h, depth);
                kochLine(x0+s/2, y0-h, x0, y0, depth);
            } else if (fractal === 'sierpinski') {
                const s = W * 0.7;
                const h = s * Math.sin(Math.PI/3);
                const x0 = W/2 - s/2, y0 = H/2 + h/2;
                sierpinski(x0, y0, s, depth);
            } else if (fractal === 'tree') {
                drawTree(W/2, H*0.85, H*0.25, -Math.PI/2, depth, depth);
            }
        }

        function hslToRgb(h, s, l) {
            s /= 100; l /= 100;
            const c = (1 - Math.abs(2*l-1)) * s;
            const x = c * (1 - Math.abs((h/60)%2-1));
            const m = l - c/2;
            let r,g,b;
            if(h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}
            return [Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];
        }

        function kochLine(x1,y1,x2,y2,d) {
            if(d===0) { ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); return; }
            const dx = x2-x1, dy = y2-y1;
            const ax = x1+dx/3, ay = y1+dy/3;
            const bx = x1+dx*2/3, by = y1+dy*2/3;
            const px = (ax+bx)/2 - (by-ay)*Math.sqrt(3)/2;
            const py = (ay+by)/2 + (bx-ax)*Math.sqrt(3)/2;
            kochLine(x1,y1,ax,ay,d-1);
            kochLine(ax,ay,px,py,d-1);
            kochLine(px,py,bx,by,d-1);
            kochLine(bx,by,x2,y2,d-1);
        }

        function sierpinski(x,y,s,d) {
            if(d===0) {
                const h = s*Math.sin(Math.PI/3);
                ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+s,y); ctx.lineTo(x+s/2,y-h); ctx.closePath();
                const t = 1-d/+depthSlider.value;
                ctx.fillStyle = colorSchemes[colorScheme].fn(Math.random()*0.5+0.3);
                ctx.fill();
                return;
            }
            const ns = s/2;
            const h = ns*Math.sin(Math.PI/3);
            sierpinski(x,y,ns,d-1);
            sierpinski(x+ns,y,ns,d-1);
            sierpinski(x+ns/2,y-h,ns,d-1);
        }

        function drawTree(x,y,len,angle,d,maxD) {
            if(d===0||len<2) return;
            const endX = x + len*Math.cos(angle);
            const endY = y + len*Math.sin(angle);
            const t = 1 - d/maxD;
            ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(endX,endY);
            ctx.strokeStyle = colorSchemes[colorScheme].fn(t);
            ctx.lineWidth = Math.max(1, d*1.5);
            ctx.stroke();
            const branchAngle = (+angleSlider.value)*Math.PI/180;
            drawTree(endX,endY,len*0.7,angle-branchAngle,d-1,maxD);
            drawTree(endX,endY,len*0.7,angle+branchAngle,d-1,maxD);
        }

        generate();
    </script>
</body>
