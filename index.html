    <style>
        :root {
            --bg: #0b1120;
            --surface: #141c2e;
            --border: rgba(255,255,255,0.06);
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans Georgian', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .site-header {
            text-align: center;
            padding: 50px 20px 30px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(59,130,246,0.06) 0%, transparent 100%);
        }
        .site-header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .site-header h1 span {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .site-header p {
            color: var(--muted);
            font-size: 0.95rem;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* ── Subject Grid ── */
        .subjects {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ── Each Subject Accordion ── */
        .subject {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .subject:hover, .subject.open {
            border-color: rgba(255,255,255,0.12);
        }

        .subject-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .subject-header:hover {
            background: rgba(255,255,255,0.03);
        }

        .subject-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .subject-name {
            font-weight: 700;
            font-size: 1.05rem;
            flex: 1;
        }

        .subject-count {
            font-size: 0.75rem;
            color: var(--muted);
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .arrow {
            width: 20px;
            height: 20px;
            color: var(--muted);
            transition: transform 0.3s;
            flex-shrink: 0;
        }
        .subject.open .arrow {
            transform: rotate(180deg);
        }

        /* ── Dropdown Topics ── */
        .topics {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            background: rgba(0,0,0,0.2);
        }
        .subject.open .topics {
            max-height: 600px;
        }

        .topics-inner {
            padding: 6px 20px 14px 74px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .topic-link {
            display: block;
            padding: 8px 14px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s;
            position: relative;
        }
        .topic-link:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text);
            padding-left: 18px;
        }
        .topic-link::before {
            content: '›';
            position: absolute;
            left: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            color: var(--accent);
            font-weight: bold;
        }
        .topic-link:hover::before {
            opacity: 1;
        }

        /* ── Color variants ── */
        .c-physics .subject-icon { background: linear-gradient(135deg, #3b82f6, #6366f1); }
        .c-chemistry .subject-icon { background: linear-gradient(135deg, #10b981, #059669); }
        .c-biology .subject-icon { background: linear-gradient(135deg, #84cc16, #65a30d); }
        .c-math .subject-icon { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .c-history .subject-icon { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .c-geo .subject-icon { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
        .c-it .subject-icon { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .c-lit .subject-icon { background: linear-gradient(135deg, #d946ef, #a855f7); }
        .c-art .subject-icon { background: linear-gradient(135deg, #f43f5e, #e11d48); }
        .c-civic .subject-icon { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 25px;
            color: var(--muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .site-header h1 { font-size: 1.5rem; }
            .topics-inner { padding-left: 20px; }
            .subject-header { padding: 12px 14px; gap: 10px; }
        }
    </style>
</head>

            ["კონფლიქტების მართვა","სამოქალაქო_განათლება/კონფლიქტების_მართვა/index.html"],
            ["ადამიანის უფლებები","სამოქალაქო_განათლება/ადამიანის_უფლებები/index.html"],
            ["გლობალიზაცია","სამოქალაქო_განათლება/გლობალიზაცია/index.html"],
            ["მედიაწიგნიერება","სამოქალაქო_განათლება/მედიაწიგნიერება/index.html"],
            ["მდგრადი განვითარება","სამოქალაქო_განათლება/მდგრადი_განვითარება/index.html"],
            ["მეწარმეობა","სამოქალაქო_განათლება/მეწარმეობა/index.html"]
        ]}
    ];

    const container = document.getElementById('subjects');
    const arrowSVG = '<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>';

    DATA.forEach(s => {
        const div = document.createElement('div');
        div.className = 'subject ' + s.cls;

        const topicsHTML = s.topics.map(t =>
            `<a class="topic-link" href="${t[1]}">${t[0]}</a>`
        ).join('');

        div.innerHTML = `
            <div class="subject-header" onclick="this.parentElement.classList.toggle('open')">
                <div class="subject-icon">${s.icon}</div>
                <div class="subject-name">${s.name}</div>
                <div class="subject-count">${s.topics.length} თემა</div>
                ${arrowSVG}
            </div>
            <div class="topics">
                <div class="topics-inner">${topicsHTML}</div>
            </div>
        `;
        container.appendChild(div);
    });
    </script>
</body>
