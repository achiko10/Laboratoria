<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ინფორმატიკა — კომპიუტერული გრაფიკა</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Georgian',sans-serif!important;background:#0a0e17!important;color:#e0e6f0;min-height:100vh;display:flex!important;flex-direction:column!important}
.u-header{display:flex;align-items:center;gap:15px;padding:10px 20px;background:#111827;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.u-back{color:#7a84a0;text-decoration:none;font-size:.82rem;padding:5px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;transition:.2s;white-space:nowrap}
.u-back:hover{background:rgba(255,255,255,.12);color:#e0e6f0}
.u-header h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.u-body{flex:1;display:flex;justify-content:center;padding:15px}
.u-card{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;width:100%;max-width:1000px;box-shadow:0 4px 30px rgba(0,0,0,.4)}
.u-card .container,.u-card .app{max-width:none;margin:0;padding:0}
.u-card canvas{display:block}
.u-card .simulation-area,.u-card .sim-area{min-height:300px}</style>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }
        
        
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 15px; }
        .app { max-width: 800px; margin: auto; display: grid; grid-template-columns: 1fr 200px; gap: 15px; }
        @media (max-width: 768px) { .app { grid-template-columns: 1fr; } }
        .canvas-wrap { background: #1e293b; border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .pixel-grid { display: grid; gap: 1px; background: #334155; border-radius: 8px; overflow: hidden; margin: auto; }
        .pixel { background: #0f172a; cursor: crosshair; transition: background 0.05s; }
        .pixel:hover { opacity: 0.8; }
        .panel { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
        .tool-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
        .tool-btn { padding: 8px; background: #0f172a; border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; color: #94a3b8; cursor: pointer; font-size: 0.8rem; text-align: center; transition: 0.2s; }
        .tool-btn.active { background: linear-gradient(135deg, #ec4899, #f59e0b); color: white; border-color: #ec4899; }
        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; }
        .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-swatch.active { border-color: #fff; transform: scale(1.15); }
        .current-color { height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-family: 'Courier New'; }
        .size-btns { display: flex; gap: 5px; }
        .size-btn { flex: 1; padding: 8px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #94a3b8; cursor: pointer; font-family: inherit; font-size: 0.7rem; text-align: center; }
        .size-btn.active { background: #ec4899; color: white; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 0.8rem; color: white; width: 100%; transition: 0.2s; }
        .btn:hover { transform: translateY(-1px); }
        .btn-clear { background: #ef4444; }
        .btn-dl { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
        .preview-canvas { width: 100%; image-rendering: pixelated; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .info-box { background: #0f172a; border-left: 3px solid #ec4899; border-radius: 8px; padding: 10px; font-size: 0.73rem; color: #94a3b8; line-height: 1.5; }
        .info-box b { color: #f9a8d4; }</style>
</head>
<body>
<div class="u-header">
<a href="../../index.html" class="u-back">← მთავარზე</a>
<h1>ინფორმატიკა — კომპიუტერული გრაფიკა</h1>
</div>
<div class="u-body">
<div class="u-card">
<div class="app">
        <div class="canvas-wrap">
            <div class="pixel-grid" id="pixel-grid"></div>
            <canvas id="preview" class="preview-canvas" style="display:none;"></canvas>
        </div>
        <div class="panel">
            <div style="font-weight:bold; color:#ec4899; font-size:0.85rem;">🖌️ ინსტრუმენტი</div>
            <div class="tool-btns">
                <div class="tool-btn active" onclick="setTool('pen', this)">✏️ კალამი</div>
                <div class="tool-btn" onclick="setTool('eraser', this)">🧽 საშლელი</div>
                <div class="tool-btn" onclick="setTool('fill', this)">🪣 შევსება</div>
                <div class="tool-btn" onclick="setTool('picker', this)">💉 პიპეტი</div>
            </div>
            <div style="font-weight:bold; color:#f59e0b; font-size:0.85rem;">🎨 ფერი</div>
            <div class="current-color" id="current-color" style="background:#ef4444;">#EF4444</div>
            <div class="color-grid" id="color-grid"></div>
            <input type="color" id="custom-color" style="width:100%; height:30px; border:none; border-radius:6px; cursor:pointer;" value="#ef4444">
            <div style="font-weight:bold; color:#06b6d4; font-size:0.85rem;">📐 ბადის ზომა</div>
            <div class="size-btns">
                <button class="size-btn" onclick="setGridSize(8, this)">8×8</button>
                <button class="size-btn active" onclick="setGridSize(16, this)">16×16</button>
                <button class="size-btn" onclick="setGridSize(32, this)">32×32</button>
            </div>
            <button class="btn btn-dl" onclick="downloadArt()">💾 ჩამოტვირთვა</button>
            <button class="btn btn-clear" onclick="clearGrid()">🗑️ გასუფთავება</button>
            <div class="info-box">
                <b>პიქსელი</b> — გამოსახულების უმცირესი ერთეული. ყველა ციფრული სურათი პიქსელებისგან შედგება. <b>რეზოლუცია</b> = პიქსელების რაოდენობა. <b>RGB</b> (წითელი, მწვანე, ლურჯი) — ფერის კოდირება.
            </div>
        </div>
    </div>
    <div style="text-align:center;"></div>
</div>
</div>
<script>
        let gridSize = 16;
        let currentColor = '#ef4444';
        let tool = 'pen';
        let isDrawing = false;
        let gridData = [];

        const palette = [
            '#000000','#ffffff','#ef4444','#f97316','#f59e0b','#eab308',
            '#22c55e','#10b981','#06b6d4','#3b82f6','#6366f1','#8b5cf6',
            '#a855f7','#ec4899','#f43f5e','#78716c','#475569','#1e293b',
        ];

        // Build color grid
        const colorGrid = document.getElementById('color-grid');
        palette.forEach((c, i) => {
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch' + (c === currentColor ? ' active' : '');
            swatch.style.background = c;
            swatch.onclick = () => { selectColor(c); document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active')); swatch.classList.add('active'); };
            colorGrid.appendChild(swatch);
        });

        document.getElementById('custom-color').addEventListener('input', function() { selectColor(this.value); });

        function selectColor(c) {
            currentColor = c;
            const cc = document.getElementById('current-color');
            cc.style.background = c;
            cc.textContent = c.toUpperCase();
            cc.style.color = isLightColor(c) ? '#000' : '#fff';
        }

        function isLightColor(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return (r * 299 + g * 587 + b * 114) / 1000 > 128;
        }

        function setTool(t, el) {
            tool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        function setGridSize(size, el) {
            gridSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
            buildGrid();
        }

        function buildGrid() {
            const grid = document.getElementById('pixel-grid');
            gridData = Array(gridSize * gridSize).fill('#0f172a');
            const pixelSize = Math.min(Math.floor(550 / gridSize), 40);
            grid.style.gridTemplateColumns = `repeat(${gridSize}, ${pixelSize}px)`;
            grid.innerHTML = '';
            for (let i = 0; i < gridSize * gridSize; i++) {
                const pixel = document.createElement('div');
                pixel.className = 'pixel';
                pixel.style.width = pixelSize + 'px';
                pixel.style.height = pixelSize + 'px';
                pixel.style.background = gridData[i];
                pixel.dataset.idx = i;
                pixel.addEventListener('mousedown', (e) => { e.preventDefault(); isDrawing = true; applyTool(i); });
                pixel.addEventListener('mouseenter', () => { if (isDrawing) applyTool(i); });
                pixel.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; applyTool(i); }, { passive: false });
                pixel.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const el = document.elementFromPoint(touch.clientX, touch.clientY);
                    if (el && el.dataset.idx !== undefined) applyTool(+el.dataset.idx);
                }, { passive: false });
                grid.appendChild(pixel);
            }
        }

        document.addEventListener('mouseup', () => isDrawing = false);
        document.addEventListener('touchend', () => isDrawing = false);

        function applyTool(idx) {
            const pixels = document.querySelectorAll('.pixel');
            if (tool === 'pen') {
                gridData[idx] = currentColor;
                pixels[idx].style.background = currentColor;
            } else if (tool === 'eraser') {
                gridData[idx] = '#0f172a';
                pixels[idx].style.background = '#0f172a';
            } else if (tool === 'picker') {
                selectColor(gridData[idx]);
            } else if (tool === 'fill') {
                floodFill(idx, gridData[idx], currentColor);
                pixels.forEach((p, i) => p.style.background = gridData[i]);
            }
        }

        function floodFill(idx, targetColor, replacementColor) {
            if (targetColor === replacementColor) return;
            if (gridData[idx] !== targetColor) return;
            gridData[idx] = replacementColor;
            const x = idx % gridSize, y = Math.floor(idx / gridSize);
            if (x > 0) floodFill(idx - 1, targetColor, replacementColor);
            if (x < gridSize - 1) floodFill(idx + 1, targetColor, replacementColor);
            if (y > 0) floodFill(idx - gridSize, targetColor, replacementColor);
            if (y < gridSize - 1) floodFill(idx + gridSize, targetColor, replacementColor);
        }

        function clearGrid() { buildGrid(); }

        function downloadArt() {
            const c = document.getElementById('preview');
            c.width = gridSize; c.height = gridSize;
            const ctx = c.getContext('2d');
            for (let i = 0; i < gridData.length; i++) {
                const x = i % gridSize, y = Math.floor(i / gridSize);
                ctx.fillStyle = gridData[i];
                ctx.fillRect(x, y, 1, 1);
            }
            const link = document.createElement('a');
            link.download = 'pixel_art_' + gridSize + 'x' + gridSize + '.png';
            link.href = c.toDataURL();
            link.click();
        }

        buildGrid();
    </script>
</body>
</html>
