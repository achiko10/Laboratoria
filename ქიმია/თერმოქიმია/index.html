<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>თერმოქიმია</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;600;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Fira GO', sans-serif;
            background: radial-gradient(circle at top right, #3f2b96 0%, #03001e 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            color: #cbd5e1; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;
            background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 8px; transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #f97316, #fde047);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;
        }

        main {
            display: grid; grid-template-columns: 350px 1fr; gap: 2rem; padding: 2rem; flex: 1;
        }

        .panel {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 2rem; backdrop-filter: blur(20px);
        }

        .controls { display: flex; flex-direction: column; gap: 1.5rem; }
        .control-group label { display: block; margin-bottom: 0.5rem; color: #cbd5e1; font-size: 0.9rem; }
        
        button.action-btn {
            width: 100%; padding: 1rem; border-radius: 12px; border: none; font-size: 1.1rem;
            font-weight: 800; cursor: pointer; transition: 0.3s; font-family: 'Fira GO', sans-serif;
            background: #cbd5e1; color: #0f172a; margin-top: 0.5rem;
        }
        
        button.btn-exo { background: linear-gradient(135deg, #ef4444, #f97316); color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        button.btn-endo { background: linear-gradient(135deg, #3b82f6, #06b6d4); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .dashboard { margin-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem; }
        .temp-display { font-size: 3rem; font-weight: 800; text-align: center; font-variant-numeric: tabular-nums; transition: color 0.5s; }
        
        .simulation-area {
            display: flex; flex-direction: column; gap: 1rem;
        }
        
        .visual {
            background: rgba(0,0,0,0.4); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            height: 350px; position: relative; display: flex; justify-content: center; align-items: flex-end;
            overflow: hidden; padding-bottom: 40px;
        }

        .graph {
            height: 200px; background: rgba(0,0,0,0.6); border-radius: 12px; position: relative;
            padding: 10px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Laboratory Flask CSS Art */
        .flask {
            width: 120px; height: 160px; position: relative; z-index: 10;
        }
        .flask-neck {
            width: 40px; height: 60px; border: 4px solid rgba(255,255,255,0.8);
            border-bottom: none; border-radius: 5px 5px 0 0; margin: 0 auto;
            position: relative; background: rgba(255,255,255,0.1);
        }
        .flask-body {
            width: 120px; height: 100px; border: 4px solid rgba(255,255,255,0.8);
            border-top: none; border-radius: 0 0 60px 60px;
            background: rgba(255,255,255,0.1); position: relative; overflow: hidden;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5);
        }
        .liquid {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: #38bdf8; transition: background 1s, height 0.5s;
            box-shadow: inset 0 10px 20px rgba(255,255,255,0.2);
        }
        .bubbles {
            position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events:none;
        }

        /* Burner/Stand */
        .stand { width: 140px; height: 10px; background: #64748b; margin: 0 auto; border-radius: 5px; position: relative; z-index:5;}
        
        @keyframes float { 0% {transform: translateY(100%) scale(0.5); opacity:1;} 100% {transform: translateY(-20px) scale(1.5); opacity:0;} }

        @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <a href="../../index.html" class="back-btn"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> მთავარზე დაბრუნება</a>
        <h1>თერმოქიმია</h1>
        <div style="width:150px"></div>
    </header>

    <main>
        <aside class="panel controls">
            <h3>რეაქციის გაშვება</h3>
            <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:1rem;">დააკვირდით ენერგიის ცვლილებას და ტემპერატურას რეაქციის მიმდინარეობისას.</p>
            
            <button class="action-btn btn-exo" onclick="startReaction('exo')">ეგზოთერმული რეაქცია (სითბოს გამოყოფა)</button>
            <div style="font-size:0.75rem; color:#fba11b; text-align:center;">მაგ: წვა, ნეიტრალიზაცია</div>
            
            <br>
            <button class="action-btn btn-endo" onclick="startReaction('endo')">ენდოთერმული რეაქცია (სითბოს შთანთქმა)</button>
            <div style="font-size:0.75rem; color:#38bdf8; text-align:center;">მაგ: დაშლა, მარილების გახსნა</div>

            <button class="action-btn" onclick="resetSim()" style="margin-top:2rem;">თავიდან დაწყება</button>

            <div class="dashboard">
                <div style="text-align:center; color:#94a3b8; font-size:0.9rem;">მიმდინარე ტემპერატურა</div>
                <div class="temp-display" id="temp-val">25.0 °C</div>
                <div style="text-align:center; font-size:0.8rem; margin-top:10px; color:#cbd5e1;" id="reaction-status">სისტემა სტაბილურია</div>
            </div>
        </aside>

        <section class="simulation-area">
            <div class="visual">
                <div>
                    <div class="flask">
                        <div class="flask-neck"></div>
                        <div class="flask-body">
                            <div class="liquid" id="liquid"></div>
                            <div class="bubbles" id="bubbles-container"></div>
                        </div>
                    </div>
                    <div class="stand"></div>
                </div>
            </div>

            <!-- Custom Temperature Chart using Canvas -->
            <div class="graph">
                <canvas id="chartCanvas"></canvas>
            </div>
        </section>
    </main>

    <script>
        const liquid = document.getElementById('liquid');
        const tempDisplay = document.getElementById('temp-val');
        const statusText = document.getElementById('reaction-status');
        const bubblesContainer = document.getElementById('bubbles-container');
        
        // Chart Engine
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');
        
        let temp = 25.0; // Current Temp
        let targetTemp = 25.0;
        let reactionActive = false;
        
        let timeHistory = [];
        let tempHistory = [];
        const MAX_HISTORY = 100;

        function resizeArr() {
            canvas.width = canvas.parentElement.clientWidth - 20;
            canvas.height = canvas.parentElement.clientHeight - 20;
        }
        window.addEventListener('resize', resizeArr);
        resizeArr();

        function createBubble() {
            if(!reactionActive) return;
            const b = document.createElement('div');
            b.style.position = 'absolute';
            b.style.bottom = '0';
            b.style.left = Math.random() * 100 + '%';
            b.style.width = (Math.random() * 6 + 2) + 'px';
            b.style.height = b.style.width;
            b.style.background = 'rgba(255,255,255,0.6)';
            b.style.borderRadius = '50%';
            b.style.animation = `float ${Math.random() * 1 + 0.5}s linear forwards`;
            bubblesContainer.appendChild(b);
            setTimeout(() => b.remove(), 1500);
        }

        setInterval(() => {
            if(reactionActive) createBubble();
        }, 100);

        function startReaction(type) {
            if(reactionActive) return;
            reactionActive = true;
            
            if(type === 'exo') {
                targetTemp = 85.0;
                liquid.style.background = '#ef4444'; // Turns Red
                statusText.innerText = "რეაქცია მიმდინარეობს... სითბო გამოიყოფა გარემოში (ΔH < 0)";
                tempDisplay.style.color = '#ef4444';
            } else {
                targetTemp = -5.0;
                liquid.style.background = '#0ea5e9'; // Turns Deep Blue/Cyan
                statusText.innerText = "რეაქცია მიმდინარეობს... სითბო შთაინთქმება გარემოდან (ΔH > 0)";
                tempDisplay.style.color = '#38bdf8';
            }
        }

        function resetSim() {
            reactionActive = false;
            targetTemp = 25.0;
            tempHistory = [];
            statusText.innerText = "სისტემა სტაბილურია (ოთახის ტემპერატურა)";
            tempDisplay.style.color = '#f8fafc';
            liquid.style.background = '#38bdf8'; // Default ambient liquid
        }

        function drawChart() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
            
            ctx.fillStyle = "#94a3b8"; ctx.font="10px sans-serif";
            ctx.fillText("100°C", 5, 10);
            ctx.fillText("25°C", 5, canvas.height/2 + 3);
            ctx.fillText="-20°C", 5, canvas.height - 2);

            if(tempHistory.length < 2) return;

            ctx.beginPath();
            ctx.strokeStyle = (temp > 25) ? "#ef4444" : "#38bdf8";
            ctx.lineWidth = 3;
            
            let xStep = canvas.width / MAX_HISTORY;
            
            for(let i=0; i<tempHistory.length; i++) {
                let x = i * xStep;
                // Map temp (-20 to 100) to Canvas Height (H to 0)
                let y = canvas.height - ((tempHistory[i] + 20) / 120) * canvas.height;
                
                if(i===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.stroke();
            
            // Fill under line
            ctx.lineTo((tempHistory.length-1)*xStep, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fillStyle = (temp > 25) ? "rgba(239, 68, 68, 0.1)" : "rgba(56, 189, 248, 0.1)";
            ctx.fill();
        }

        // Main Loop
        setInterval(() => {
            // Lerp temperature to target
            temp += (targetTemp - temp) * 0.05;
            
            // Add some jitter for realism if reaction is active
            if(Math.abs(temp - targetTemp) > 0.5 && reactionActive) {
                temp += (Math.random() - 0.5);
            }

            tempDisplay.innerText = temp.toFixed(1) + " °C";

            tempHistory.push(temp);
            if(tempHistory.length > MAX_HISTORY) tempHistory.shift();

            drawChart();
            
            if(reactionActive && Math.abs(temp - targetTemp) < 0.2) {
                reactionActive = false;
                statusText.innerText = "რეაქცია დასრულდა. მიღწეულია წონასწორობა.";
            }

        }, 100);

    </script>
</body>
</html>
