<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ქიმიური ბმები</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;600;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Fira GO', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem; background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            color: #cbd5e1; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;
            background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 8px; transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #f43f5e, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        main {
            display: grid; grid-template-columns: 350px 1fr; gap: 2rem; padding: 2rem; flex: 1;
        }

        .controls {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem;
        }

        .selector-box {
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .selector-box label { font-size: 0.9rem; color: #94a3b8; }
        select {
            width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 8px; font-size: 1rem; outline: none;
            font-family: 'Fira GO', sans-serif;
        }

        .btn-bond {
            background: linear-gradient(135deg, #ec4899, #8b5cf6); border: none; padding: 1rem;
            color: white; font-weight: 800; font-size: 1.1rem; border-radius: 10px; cursor: pointer;
            transition: 0.3s; font-family: 'Fira GO', sans-serif; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }
        .btn-bond:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5); }

        .result-panel {
            background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 12px; margin-top: 1rem;
            border-left: 4px solid #8b5cf6; display: none;
        }
        .bond-type { font-size: 1.4rem; font-weight: 800; color: #f472b6; margin-bottom: 0.5rem; }
        .bond-desc { font-size: 0.9rem; color: #cbd5e1; line-height: 1.5; }

        .simulation-area {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; display: flex; justify-content: center; align-items: center; position: relative;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; border-radius: 20px; }

        .overlay-instruction {
            position: absolute; top: 20px; text-align: center; width: 100%;
            color: #64748b; font-size: 1.1rem; pointer-events: none;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .simulation-area { height: 400px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="../../index.html" class="back-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            მთავარზე დაბრუნება
        </a>
        <h1>ქიმიური ბმები</h1>
        <div style="width:150px"></div>
    </header>

    <main>
        <aside class="controls">
            <h2 style="font-size: 1.2rem;">ააგეთ მოლეკულა</h2>
            <p style="font-size: 0.85rem; color: #94a3b8;">აირჩიეთ ორი ატომი, რათა დააკვირდეთ როგორ ურთიერთქმედებენ მათი ელექტრონები.</p>

            <div class="selector-box">
                <label>ატომი 1 (A)</label>
                <select id="atom1">
                    <option value="Na">Na - ნატრიუმი (ტუტე ლითონი)</option>
                    <option value="H" selected>H - წყალბადი (არამეტალი)</option>
                    <option value="C">C - ნახშირბადი (არამეტალი)</option>
                    <option value="Mg">Mg - მაგნიუმი (მეტალი)</option>
                </select>
            </div>

            <div class="selector-box">
                <label>ატომი 2 (B)</label>
                <select id="atom2">
                    <option value="Cl">Cl - ქლორი (ჰალოგენი)</option>
                    <option value="O" selected>O - ჟანგბადი (არამეტალი)</option>
                    <option value="H">H - წყალბადი (არამეტალი)</option>
                    <option value="F">F - ფთორი (ჰალოგენი)</option>
                </select>
            </div>

            <button class="btn-bond" id="bond-btn">ბმის შექმნა ⚡</button>

            <div class="result-panel" id="result-panel">
                <div class="bond-type" id="b-type">კოვალენტური ბმა</div>
                <div class="bond-desc" id="b-desc">...</div>
            </div>
        </aside>

        <section class="simulation-area">
            <div class="overlay-instruction" id="overlay">აირჩიეთ ატომები და დააჭირეთ "ბმის შექმნას"</div>
            <canvas id="simCanvas"></canvas>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resize);
        resize();

        const ATOMS = {
            "Na": { name:"ნატრიუმი", sym:"Na", type:"metal", val:1, rings:[2,8,1], color:"#f87171" },
            "Mg": { name:"მაგნიუმი", sym:"Mg", type:"metal", val:2, rings:[2,8,2], color:"#fb923c" },
            "H":  { name:"წყალბადი", sym:"H",  type:"nonmetal", val:1, rings:[1], color:"#e2e8f0" },
            "C":  { name:"ნახშირბადი", sym:"C", type:"nonmetal", val:4, rings:[2,4], color:"#52525b" },
            "O":  { name:"ჟანგბადი", sym:"O",  type:"nonmetal", val:6, rings:[2,6], color:"#38bdf8" },
            "F":  { name:"ფთორი", sym:"F",  type:"nonmetal", val:7, rings:[2,7], color:"#c084fc" },
            "Cl": { name:"ქლორი", sym:"Cl", type:"nonmetal", val:7, rings:[2,8,7], color:"#4ade80" }
        };

        let animData = null; 
        
        function drawAtom(x, y, atom, scale, currentPhase, isRight) {
            ctx.save();
            ctx.translate(x, y);

            // Nucleus
            ctx.beginPath(); ctx.arc(0, 0, 15*scale, 0, Math.PI*2);
            ctx.fillStyle = atom.color; ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = `bold ${12*scale}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.fillText(atom.sym, 0, 0);

            // Orbitals
            for(let i=0; i<atom.rings.length; i++) {
                let r = (35 + i*25) * scale;
                ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.stroke();

                let electrons = atom.rings[i];
                let isOuter = (i === atom.rings.length - 1);
                
                // Active electrons calculations based on bond type and animation phase (0 to 1)
                for(let e=0; e<electrons; e++) {
                    let angle = (e * Math.PI*2) / electrons;
                    if(isOuter) angle += Date.now()*0.001 * (isRight?-0.5:0.5); // Slow rotation only for outer shell visualization
                    
                    let ex = Math.cos(angle) * r;
                    let ey = Math.sin(angle) * r;

                    ctx.beginPath(); ctx.arc(ex, ey, 4*scale, 0, Math.PI*2);
                    ctx.fillStyle = (isOuter) ? "#fde047" : "#94a3b8";
                    
                    if(isOuter) { ctx.shadowBlur = 5; ctx.shadowColor = "#fde047"; }
                    ctx.fill(); ctx.shadowBlur = 0;
                }
            }
            ctx.restore();
        }

        // We will do a generic animation state structure
        let t = 0;

        function render() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            if(animData) {
                // Intro phase: Atoms move closer
                if(animData.phase < 1.0) animData.phase += 0.01;
                
                let cx = canvas.width/2;
                let cy = canvas.height/2;

                let dist = 180 - (animData.phase * 60); // They get closer
                
                let x1 = cx - dist;
                let x2 = cx + dist;

                drawAtom(x1, cy, animData.a1, 1, animData.phase, false);
                drawAtom(x2, cy, animData.a2, 1, animData.phase, true);

                // Draw bond connection
                if (animData.phase > 0.8) {
                    ctx.beginPath();
                    ctx.moveTo(x1 + Math.max(...animData.a1.rings)*25, cy);
                    ctx.lineTo(x2 - Math.max(...animData.a2.rings)*25, cy);
                    ctx.lineWidth = 4;
                    
                    // Ionic = transfer, Covalent = sharing (drawn as a solid glowing connection)
                    if(animData.bondType === "იონური") {
                        ctx.strokeStyle = "rgba(244, 114, 182, 0.6)"; 
                        ctx.setLineDash([5, 10]);
                        // Ionic electron transfer animation effect
                        let ex = x1 + (x2-x1)*animData.phase; // Not perfect math but gives the idea
                        ctx.beginPath(); ctx.arc(ex, cy - 20, 5, 0, Math.PI*2); ctx.fillStyle="#fde047"; ctx.fill();
                    } else {
                        ctx.strokeStyle = "rgba(139, 92, 246, 0.8)"; 
                        ctx.shadowBlur = 10; ctx.shadowColor = "#8b5cf6";
                        ctx.setLineDash([]);
                    }
                    ctx.stroke(); ctx.shadowBlur = 0; ctx.setLineDash([]);
                }
            }

            requestAnimationFrame(render);
        }

        document.getElementById('bond-btn').addEventListener('click', () => {
            const v1 = document.getElementById('atom1').value;
            const v2 = document.getElementById('atom2').value;
            const a1 = ATOMS[v1];
            const a2 = ATOMS[v2];

            document.getElementById('overlay').style.display = 'none';

            let type = "კოვალენტური";
            let desc = "";

            // Simple logic: Metal + Nonmetal = Ionic. Nonmetal + Nonmetal = Covalent.
            if((a1.type === "metal" && a2.type === "nonmetal") || (a1.type === "nonmetal" && a2.type === "metal")) {
                type = "იონური";
                desc = `ელექტრონების სრული გადაცემა. ${a1.type==="metal"?a1.sym:a2.sym} გასცემს ვალენტურ ელექტრონს, ხოლო ${a1.type==="nonmetal"?a1.sym:a2.sym} იერთებს მას. წარმოიქმნება საპირისპიროდ დამუხტული იონები.`;
            } else if (a1.type === "nonmetal" && a2.type === "nonmetal") {
                if (v1 === v2) {
                    type = "არაპოლარული კოვალენტური";
                    desc = `ელექტრონების თანაბარი გაზიარება ორ ერთნაირ ${a1.sym} ატომს შორის. საზიარო ელექტრონული ღრუბელი სიმეტრიულია.`;
                } else {
                    type = "პოლარული კოვალენტური";
                    desc = `ელექტრონების გაზიარება, თუმცა ერთი ატომი (რომელსაც მეტი ელექტროუარყოფითობა აქვს) უფრო მეტად იზიდავს საზიარო ელექტრონებს.`;
                }
            } else {
                type = "მეტალური / სხვა";
                desc = "ორი მეტალის შემთხვევაში წარმოიქმნება მეტალური კრისტალური მესერი და 'ელექტრონული ზღვა'.";
            }

            document.getElementById('result-panel').style.display = 'block';
            document.getElementById('b-type').innerText = type + " ბმა";
            document.getElementById('b-desc').innerText = desc;

            animData = { a1, a2, phase: 0, bondType: type.split(" ")[0] };
        });

        requestAnimationFrame(render);
    </script>
</body>
</html>
