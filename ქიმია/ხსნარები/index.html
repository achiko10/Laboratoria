<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ხსნარები და კონცენტრაცია</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;600;800&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Fira GO', sans-serif;
            background: radial-gradient(circle at 50% 10%, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden;
        }

        header {
            padding: 1.5rem 2rem; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            color: #cbd5e1; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;
            background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 8px; transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        h1 {
            font-size: 2rem; background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;
        }

        main {
            display: grid; grid-template-columns: 350px 1fr; gap: 2rem; padding: 2rem; flex: 1;
        }

        .controls {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 2rem; backdrop-filter: blur(20px);
            display: flex; flex-direction: column; gap: 1.5rem;
        }

        .control-group label { display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.9rem; }
        
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 5px; outline: none; margin-bottom: 0.5rem;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
            background: #38bdf8; cursor: pointer; box-shadow: 0 0 10px #38bdf8;
        }

        .btn-action {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: #f8fafc; padding: 0.8rem; cursor: pointer; transition: 0.3s; font-family: 'Fira GO', sans-serif;
            font-weight: 600; font-size: 1rem; width: 100%;
        }
        .btn-action:hover { background: rgba(255,255,255,0.2); }
        .btn-primary { background: linear-gradient(135deg, #38bdf8, #3b82f6); border: none; font-weight: 800; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5); }

        select {
            width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 8px; font-size: 1rem; outline: none; margin-bottom: 1rem;
        }

        .stats-box {
            background: rgba(0,0,0,0.4); padding: 1.5rem; border-radius: 12px; margin-top: auto;
            border-left: 4px solid #38bdf8;
        }

        .sim-area {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px; display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden; perspective: 1000px;
        }

        /* 3D-like Beaker */
        .beaker-container {
            width: 250px; height: 350px; position: relative; z-index: 10;
        }
        .beaker-glass {
            position: absolute; width: 100%; height: 100%; border: 6px solid rgba(255,255,255,0.4);
            border-top: none; border-radius: 0 0 20px 20px; box-shadow: inset 0 0 30px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,0.05);
            z-index: 5; background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(255,255,255,0.1) 100%);
        }
        .beaker-lip {
            position: absolute; top: -10px; left: -10px; width: calc(100% + 20px); height: 20px;
            border: 6px solid rgba(255,255,255,0.4); border-radius: 50%; z-index: 6;
        }
        
        .liquid {
            position: absolute; bottom: 6px; left: 6px; width: calc(100% - 12px); 
            background: rgba(56, 189, 248, 0.2); border-radius: 0 0 14px 14px;
            transition: height 0.5s ease-out, background-color 0.5s ease;
            z-index: 2; overflow: hidden;
            height: 150px; /* Default */
        }
        .liquid::after {
            content: ''; position: absolute; top: 0; left: 0; width: 200%; height: 20px;
            background: rgba(255,255,255,0.2); border-radius: 50%; top: -10px;
        }

        /* Crystals (Precipitate) */
        .crystals {
            position: absolute; bottom: 6px; left: 6px; width: calc(100% - 12px); height: 0px;
            background: url('data:image/svg+xml;utf8,<svg width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M10 0 L20 10 L10 20 L0 10 Z" fill="rgba(255,255,255,0.6)"/></svg>');
            background-size: 15px; border-radius: 0 0 14px 14px; z-index: 3; transition: height 0.3s;
        }

        /* Floating particles */
        .particle {
            position: absolute; border-radius: 50%; background: #fff; opacity: 0;
            pointer-events: none; z-index: 4;
        }
        @keyframes fallAndDissolve {
            0% { transform: translateY(-50px) scale(1); opacity: 1; }
            70% { transform: translateY(100px) scale(0.8); opacity: 0.8; }
            100% { transform: translateY(150px) scale(0.1); opacity: 0; }
        }

        /* Measurement markings */
        .markings {
            position: absolute; right: 20px; bottom: 20px; height: 300px; width: 20px;
            border-right: 2px solid rgba(255,255,255,0.3); z-index: 1; display: flex; flex-direction: column-reverse; justify-content: space-between;
        }
        .mark { width: 10px; border-bottom: 2px solid rgba(255,255,255,0.3); }

        @media (max-width: 900px) { main { grid-template-columns: 1fr; } .sim-area { height: 500px; } }
    </style>
</head>
<body>
    <header>
        <a href="../../index.html" class="back-btn"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> მთავარზე დაბრუნება</a>
        <h1>ხსნარები და კონცენტრაცია</h1>
        <div style="width:150px"></div>
    </header>

    <main>
        <aside class="controls">
            <div>
                <label style="color:#cbd5e1; font-size:1rem; margin-bottom:0.5rem; display:block;">გახსნილი ნივთიერება (Solute)</label>
                <select id="solute-type">
                    <option value="salt">სუფრის მარილი (NaCl) - თეთრი</option>
                    <option value="kmn">კალიუმის პერმანგანატი (KMnO₄) - იასამნისფერი</option>
                    <option value="cu">სპილენძის სულფატი (CuSO₄) - ლურჯი</option>
                </select>
                <button class="btn-action btn-primary" onclick="addSolute()">+ 10გ ნივთიერების დამატება</button>
            </div>

            <div class="control-group" style="margin-top:1rem;">
                <label><span>გამხსნელის მოცულობა (წყალი)</span> <span id="vol-val">0.5 ლ</span></label>
                <input type="range" id="volume" min="0.1" max="1.0" value="0.5" step="0.1" oninput="updateSim()">
            </div>

            <div class="control-group">
                <label><span>ტემპერატურა</span> <span id="temp-val">25 °C</span></label>
                <input type="range" id="temp" min="0" max="100" value="25" step="1" oninput="updateSim()">
            </div>

            <button class="btn-action" onclick="evaporate()">აორთქლება (წყლის შემცირება)</button>
            <button class="btn-action" style="background: rgba(239, 68, 68, 0.2); border-color: rgba(239,68,68,0.5);" onclick="resetSim()">წყლის გადაღვრა / გასუფთავება</button>

            <div class="stats-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="color:#94a3b8">ნივთიერების მასა:</span>
                    <strong id="stat-mass">0 გ</strong>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="color:#94a3b8">კონცენტრაცია (C):</span>
                    <strong id="stat-conc" style="color:#38bdf8; font-size:1.2rem;">0 გ/ლ</strong>
                </div>
                <div id="status-msg" style="font-size:0.85rem; color:#4ade80; margin-top:10px; font-weight:600;">უჯერი ხსნარი</div>
            </div>
        </aside>

        <section class="sim-area" id="sim-area">
            <div class="beaker-container">
                <div class="beaker-lip"></div>
                <div class="beaker-glass"></div>
                <div class="markings">
                    <div class="mark"></div><div class="mark"></div><div class="mark"></div><div class="mark"></div><div class="mark"></div>
                </div>
                
                <div class="liquid" id="liquid"></div>
                <div class="crystals" id="crystals"></div>
            </div>
        </section>
    </main>

    <script>
        const soluteDict = {
            "salt": { color: "255,255,255", baseSolubility: 350 }, // g/L at 25C
            "kmn": { color: "168,85,247", baseSolubility: 76 },    // g/L at 25C
            "cu": { color: "56,189,248", baseSolubility: 320 }     // g/L at 25C
        };

        let mass = 0; // grams
        
        const uiVolume = document.getElementById('volume');
        const uiTemp = document.getElementById('temp');
        const simArea = document.getElementById('sim-area');
        const liquid = document.getElementById('liquid');
        const crystals = document.getElementById('crystals');
        
        function updateSim() {
            let v = parseFloat(uiVolume.value); // Liters
            let t = parseFloat(uiTemp.value); // Celsius
            let sType = document.getElementById('solute-type').value;
            
            document.getElementById('vol-val').innerText = v.toFixed(1) + " ლ";
            document.getElementById('temp-val').innerText = t.toFixed(0) + " °C";

            // Visual height for liquid (Max height is 330px inside beaker)
            let h = (v / 1.0) * 310; 
            liquid.style.height = h + "px";

            // Calculate solubility limit (increases with temp)
            let limitConc = soluteDict[sType].baseSolubility + (t - 25) * 1.5; // Simple linear model
            let limitMass = limitConc * v; // Max grams that can dissolve in this volume

            let dissolvedMass = Math.min(mass, limitMass);
            let solidMass = mass - dissolvedMass;

            let concentration = dissolvedMass / v; // g/L
            
            // Visual Color calculation based on concentration vs limit
            let intensity = Math.min(1.0, concentration / limitConc);
            // Default water color + solute color
            let rWater = 200, gWater = 240, bWater = 255;
            let cSplit = soluteDict[sType].color.split(',');
            
            let R = rWater + (parseInt(cSplit[0]) - rWater) * intensity;
            let G = gWater + (parseInt(cSplit[1]) - gWater) * intensity;
            let B = bWater + (parseInt(cSplit[2]) - bWater) * intensity;
            
            liquid.style.backgroundColor = `rgba(${R}, ${G}, ${B}, ${0.2 + intensity*0.6})`;

            // Updates crystals on bottom
            if(solidMass > 0) {
                crystals.style.height = Math.min(50, (solidMass / 20) * 10) + "px";
                document.getElementById('status-msg').innerText = "ნაჯერი ხსნარი (სპონტანური კრისტალიზაცია)";
                document.getElementById('status-msg').style.color = "#f43f5e";
            } else {
                crystals.style.height = "0px";
                document.getElementById('status-msg').innerText = concentration === 0 ? "სუფთა გამხსნელი" : "უჯერი ხსნარი";
                document.getElementById('status-msg').style.color = "#4ade80";
            }

            // Stats update
            document.getElementById('stat-mass').innerText = mass.toFixed(0) + " გ";
            document.getElementById('stat-conc').innerText = concentration.toFixed(1) + " გ/ლ";
        }

        function addSolute() {
            mass += 10;
            updateSim();

            // Particle Animation effect
            let sType = document.getElementById('solute-type').value;
            let rgb = soluteDict[sType].color;
            for(let i=0; i<15; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (simArea.clientWidth/2 - 50 + Math.random()*100) + 'px';
                p.style.top = '100px';
                let ptSize = Math.random()*4 + 2;
                p.style.width = ptSize + 'px';
                p.style.height = ptSize + 'px';
                p.style.background = `rgb(${rgb})`;
                p.style.animation = `fallAndDissolve ${1 + Math.random()*1}s linear forwards`;
                simArea.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        function evaporate() {
            let v = parseFloat(uiVolume.value);
            if(v > 0.1) {
                uiVolume.value = (v - 0.1).toFixed(1);
                updateSim();
            }
        }

        function resetSim() {
            mass = 0;
            uiVolume.value = 0.5;
            uiTemp.value = 25;
            updateSim();
        }

        // Event listener for type change to recalulcate color immediately
        document.getElementById('solute-type').addEventListener('change', () => {
            // Usually changing solute means a new experiment, let's reset mass
            mass = 0;
            updateSim();
        });

        // Init
        updateSim();
    </script>
</body>
</html>
