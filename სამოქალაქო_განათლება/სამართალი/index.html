<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>სამოქალაქო განათლება — სამართალი</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Georgian',sans-serif!important;background:#0a0e17!important;color:#e0e6f0;min-height:100vh;display:flex!important;flex-direction:column!important}
.u-header{display:flex;align-items:center;gap:15px;padding:10px 20px;background:#111827;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.u-back{color:#7a84a0;text-decoration:none;font-size:.82rem;padding:5px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;transition:.2s;white-space:nowrap}
.u-back:hover{background:rgba(255,255,255,.12);color:#e0e6f0}
.u-header h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.u-body{flex:1;display:flex;justify-content:center;padding:15px}
.u-card{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;width:100%;max-width:1000px;box-shadow:0 4px 30px rgba(0,0,0,.4)}
.u-card .container,.u-card .app{max-width:none;margin:0;padding:0}
.u-card canvas{display:block}
.u-card .simulation-area,.u-card .sim-area{min-height:300px}</style>
<style>* { margin: 0; padding: 0; box-sizing: border-box; }
        
        
        .subtitle { text-align: center; color: #8b5cf6; font-size: 0.9rem; margin-bottom: 25px; }
        
        .app { max-width: 900px; margin: auto; display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        @media (max-width: 800px) { .app { grid-template-columns: 1fr; } }

        .card { background: #fff; border-radius: 12px; padding: 25px; border: 1px solid #e9d5ff; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.15); }

        /* Draggable Items List */
        .items-area { display: flex; flex-direction: column; gap: 10px; }
        .ia-title { font-weight: bold; color: #6d28d9; margin-bottom: 10px; text-align: center; border-bottom: 2px dashed #d8b4fe; padding-bottom: 10px;}
        
        .drag-item { background: #f3e8ff; border: 2px solid #c084fc; padding: 12px 15px; border-radius: 8px; cursor: grab; font-weight: bold; color: #4c1d95; transition: 0.2s; display: flex; align-items: center; justify-content: space-between;}
        .drag-item:active { cursor: grabbing; transform: scale(1.02); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .drag-item.placed { background: #e2e8f0; border-color: #cbd5e1; color: #94a3b8; cursor: not-allowed; text-decoration: line-through;}

        .icon-drag { opacity: 0.5; font-size: 1.2rem; }

        /* Pyramid Area */
        .pyramid-area { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; padding-top: 20px;}
        
        .pyramid-level { width: 100%; height: 70px; border: 2px dashed #d8b4fe; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; background: #fff;}
        .pyramid-level.drag-over { background: #f3e8ff; border-color: #9333ea; }
        
        /* Shape the pyramid widths */
        #lvl-1 { width: 60%; background-color: #f5f3ff; } /* Top */
        #lvl-2 { width: 70%; background-color: #faf5ff;}
        #lvl-3 { width: 80%; background-color: #fff;}
        #lvl-4 { width: 90%; background-color: #fff;}
        #lvl-5 { width: 100%; background-color: #fff;} /* Bottom */

        .pl-label { position: absolute; left: -10px; top: -10px; background: #7c3aed; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold;}

        /* Placed Item inside pyramid */
        .p-content { font-weight: bold; color: #4c1d95; animation: dropIn 0.3s; width: 100%; text-align: center; }
        @keyframes dropIn { 0%{opacity:0; transform:translateY(-10px);} 100%{opacity:1; transform:translateY(0);} }

        .helper-text { text-align: center; color: #8b5cf6; font-size: 0.85rem; margin-top: 15px; font-style: italic;}

        .res-display { margin-top: 20px; padding: 15px; background: #ecfdf5; border: 1px dashed #10b981; color: #065f46; border-radius: 8px; font-weight: bold; text-align: center; display: none; }</style>
</head>
<body>
<div class="u-header">
<a href="../../index.html" class="u-back">← მთავარზე</a>
<h1>სამოქალაქო განათლება — სამართალი</h1>
</div>
<div class="u-body">
<div class="u-card">
<div class="app">
        <!-- Sidebar items -->
        <div class="card">
            <div class="ia-title">გადასატანი აქტები:</div>
            <div class="items-area" id="source-list">
                <!-- Shuffled via JS -->
            </div>
            <div style="text-align:center; margin-top: 25px;">
                <button onclick="resetGame()" style="padding:8px 15px; background:#ef4444; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">↻ თავიდან</button>
            </div>
        </div>

        <!-- Pyramid -->
        <div class="card" style="display:flex; flex-direction:column;">
            <div class="pyramid-area">
                <div class="pyramid-level" id="lvl-1" data-rank="1">
                    <div class="pl-label">უმაღლესი ძალა</div>
                </div>
                <div class="pyramid-level" id="lvl-2" data-rank="2"></div>
                <div class="pyramid-level" id="lvl-3" data-rank="3"></div>
                <div class="pyramid-level" id="lvl-4" data-rank="4"></div>
                <div class="pyramid-level" id="lvl-5" data-rank="5">
                    <div class="pl-label" style="background:#5b21b6; top:auto; bottom:-10px;">უდიდესი რაოდენობა, სუსტი ძალა</div>
                </div>
            </div>
            
            <div class="helper-text" id="helper-txt">
                ქვედა საფეხურზე მდგომი ნორმატიული აქტი არ უნდა ეწინააღმდეგებოდეს ზედა საფეხურზე მდგომ აქტს.
            </div>

            <div class="res-display" id="res-msg">
                🎉 გილოცავთ! თქვენ სწორად ააგეთ საქართველოს ნორმატიული აქტების იერარქიის პირამიდა.
            </div>
        </div>
    </div>
    
    <div style="text-align:center;"></div>
</div>
</div>
<script>
        const lawsData = [
            { id: 'lawA', text: 'საქართველოს კონსტიტუცია', rank: '1' },
            { id: 'lawB', text: 'საერთაშორისო ხელშეკრულებები', rank: '2' },
            { id: 'lawC', text: 'ორგანული კანონები', rank: '3' },
            { id: 'lawD', text: 'ჩვეულებრივი კანონები', rank: '4' },
            { id: 'lawE', text: 'კანონქვემდებარე აქტები (ბრძანებები)', rank: '5' }
        ];

        let draggedItem = null;
        let placedCount = 0;

        function initGame() {
            const list = document.getElementById('source-list');
            list.innerHTML = '';
            placedCount = 0;
            document.getElementById('res-msg').style.display = 'none';

            // Clean pyramid
            document.querySelectorAll('.pyramid-level').forEach(lvl => {
                // Keep the label if it exists
                const label1 = lvl.querySelector('.pl-label') ? lvl.querySelector('.pl-label').outerHTML : '';
                lvl.innerHTML = label1; 
                lvl.classList.remove('filled');
                lvl.style.borderColor = '#d8b4fe';
                lvl.style.backgroundColor = '';
            });

            // Shuffle
            const shuffled = [...lawsData].sort(() => Math.random() - 0.5);

            shuffled.forEach(law => {
                const div = document.createElement('div');
                div.className = 'drag-item';
                div.draggable = true;
                div.id = law.id;
                div.dataset.rank = law.rank;
                div.innerHTML = `<span>${law.text}</span> <span class="icon-drag">☰</span>`;

                div.addEventListener('dragstart', function(e) {
                    if(this.classList.contains('placed')) return e.preventDefault();
                    draggedItem = this;
                    setTimeout(() => this.style.opacity = '0.5', 0);
                });

                div.addEventListener('dragend', function() {
                    this.style.opacity = '1';
                    draggedItem = null;
                });

                list.appendChild(div);
            });

            setupDropZones();
        }

        function setupDropZones() {
            const levels = document.querySelectorAll('.pyramid-level');
            
            // Re-clone to remove old listeners
            levels.forEach(lvl => lvl.replaceWith(lvl.cloneNode(true)));
            
            document.querySelectorAll('.pyramid-level').forEach(lvl => {
                lvl.addEventListener('dragover', e => {
                    e.preventDefault();
                    if(!lvl.classList.contains('filled')) lvl.classList.add('drag-over');
                });

                lvl.addEventListener('dragleave', e => {
                    lvl.classList.remove('drag-over');
                });

                lvl.addEventListener('drop', e => {
                    e.preventDefault();
                    lvl.classList.remove('drag-over');

                    if (draggedItem && !lvl.classList.contains('filled')) {
                        const expectedRank = lvl.dataset.rank;
                        const itemRank = draggedItem.dataset.rank;

                        if (expectedRank === itemRank) {
                            // Correct drop
                            lvl.classList.add('filled');
                            const content = document.createElement('div');
                            content.className = 'p-content';
                            content.textContent = draggedItem.querySelector('span').textContent;
                            lvl.appendChild(content);

                            // Styling
                            lvl.style.borderColor = '#10b981'; // Green
                            lvl.style.backgroundColor = '#ecfdf5';

                            // Disable dragged item
                            draggedItem.classList.add('placed');
                            draggedItem.draggable = false;
                            
                            placedCount++;
                            if (placedCount === lawsData.length) {
                                document.getElementById('res-msg').style.display = 'block';
                            }

                        } else {
                            // Wrong drop effect
                            const oldTr = lvl.style.transition;
                            lvl.style.transition = 'none';
                            lvl.style.borderColor = '#ef4444';
                            lvl.style.backgroundColor = '#fee2e2';
                            
                            setTimeout(() => {
                                lvl.style.transition = oldTr;
                                lvl.style.borderColor = '#d8b4fe';
                                lvl.style.backgroundColor = '';
                            }, 400);
                        }
                    }
                });
            });
        }

        function resetGame() {
            initGame();
        }

        // Run
        initGame();
    </script>
</body>
</html>
