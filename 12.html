<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Mind Map // CYBER-MATRIX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000308;
    color: #00ffcc;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  canvas { display: block; }

  /* HUD Overlay */
  #hud {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* Top Bar */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50px;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    z-index: 20;
    border-bottom: 1px solid rgba(0,255,204,0.2);
  }

  #title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc;
  }

  .scan-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #00ffcc44, #ff00ff44, transparent);
  }

  #node-count {
    font-size: 11px;
    color: #ff00ff;
    letter-spacing: 2px;
  }

  /* Controls Panel */
  #controls {
    position: fixed;
    left: 20px;
    top: 70px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 20;
    pointer-events: all;
  }

  .ctrl-btn {
    background: rgba(0, 255, 204, 0.05);
    border: 1px solid rgba(0, 255, 204, 0.4);
    color: #00ffcc;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
  }

  .ctrl-btn::before {
    content: '';
    position: absolute;
    left: -100%; top: 0;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,204,0.1), transparent);
    transition: left 0.3s;
  }

  .ctrl-btn:hover::before { left: 100%; }
  .ctrl-btn:hover {
    background: rgba(0, 255, 204, 0.15);
    border-color: #00ffcc;
    box-shadow: 0 0 15px rgba(0,255,204,0.3);
  }

  .ctrl-btn.danger {
    border-color: rgba(255, 0, 80, 0.4);
    color: #ff0050;
  }
  .ctrl-btn.danger:hover {
    background: rgba(255, 0, 80, 0.15);
    border-color: #ff0050;
    box-shadow: 0 0 15px rgba(255,0,80,0.3);
  }

  .ctrl-btn.ai-btn {
    border-color: rgba(180, 0, 255, 0.4);
    color: #b400ff;
  }
  .ctrl-btn.ai-btn:hover {
    background: rgba(180, 0, 255, 0.15);
    border-color: #b400ff;
    box-shadow: 0 0 15px rgba(180,0,255,0.3);
  }

  /* Info Panel */
  #info-panel {
    position: fixed;
    right: 20px;
    top: 70px;
    width: 220px;
    background: rgba(0,3,8,0.85);
    border: 1px solid rgba(0,255,204,0.3);
    padding: 14px;
    z-index: 20;
    pointer-events: none;
  }

  #info-panel::before {
    content: 'NODE_INFO';
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: #ff00ff;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255,0,255,0.3);
    padding-bottom: 6px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin-bottom: 5px;
    color: rgba(0,255,204,0.6);
  }

  .info-val {
    color: #00ffcc;
    text-shadow: 0 0 8px #00ffcc;
  }

  /* Add Node Modal */
  #modal {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,3,8,0.95);
    border: 1px solid #00ffcc;
    box-shadow: 0 0 40px rgba(0,255,204,0.3), inset 0 0 40px rgba(0,255,204,0.02);
    padding: 30px;
    z-index: 100;
    min-width: 320px;
    pointer-events: all;
  }

  #modal h3 {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 4px;
    color: #00ffcc;
    text-shadow: 0 0 15px #00ffcc;
    margin-bottom: 20px;
  }

  #modal input {
    width: 100%;
    background: rgba(0,255,204,0.05);
    border: 1px solid rgba(0,255,204,0.4);
    color: #00ffcc;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px;
    margin-bottom: 12px;
    outline: none;
  }

  #modal input:focus {
    border-color: #00ffcc;
    box-shadow: 0 0 10px rgba(0,255,204,0.2);
  }

  .modal-btns {
    display: flex;
    gap: 10px;
  }

  /* AI Status */
  #ai-status {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 3px;
    color: #b400ff;
    text-shadow: 0 0 10px #b400ff;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #ai-status.visible { opacity: 1; }

  /* Corner Decorations */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 15;
    pointer-events: none;
  }
  .corner.tl { top: 60px; left: 10px; border-top: 1px solid #00ffcc44; border-left: 1px solid #00ffcc44; }
  .corner.tr { top: 60px; right: 10px; border-top: 1px solid #00ffcc44; border-right: 1px solid #00ffcc44; }
  .corner.bl { bottom: 10px; left: 10px; border-bottom: 1px solid #00ffcc44; border-left: 1px solid #00ffcc44; }
  .corner.br { bottom: 10px; right: 10px; border-bottom: 1px solid #00ffcc44; border-right: 1px solid #00ffcc44; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(0,3,8,0.9);
    border: 1px solid #00ffcc44;
    padding: 6px 12px;
    font-size: 11px;
    letter-spacing: 1px;
    color: #00ffcc;
    pointer-events: none;
    z-index: 50;
    display: none;
  }

  /* Scanlines effect */
  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 20;
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(0,255,204,0.5);
    text-align: right;
    line-height: 1.8;
    pointer-events: none;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Glitch animation for title */
  @keyframes glitch {
    0%, 90%, 100% { text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; }
    92% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
    94% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
    96% { text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; }
  }
  #title { animation: glitch 4s infinite; }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<div id="scanlines"></div>

<!-- Top Bar -->
<div id="topbar">
  <div id="title">NEURAL // MINDMAP</div>
  <div class="scan-line"></div>
  <div id="node-count">NODES: <span id="nc">0</span> | LINKS: <span id="lc">0</span></div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl-btn" onclick="openModal()">+ ADD NODE</button>
  <button class="ctrl-btn danger" onclick="deleteSelected()">✕ DELETE</button>
  <button class="ctrl-btn ai-btn" onclick="aiConnect()">⬡ AI CONNECT</button>
  <button class="ctrl-btn" onclick="toggleSignals()">⚡ SIGNALS</button>
  <button class="ctrl-btn" onclick="resetCamera()">⊙ RESET VIEW</button>
  <button class="ctrl-btn" onclick="autoLayout()">⊞ AUTO LAYOUT</button>
</div>

<!-- Info Panel -->
<div id="info-panel">
  <div class="info-row"><span>ID</span><span class="info-val" id="inf-id">—</span></div>
  <div class="info-row"><span>LABEL</span><span class="info-val" id="inf-label">—</span></div>
  <div class="info-row"><span>CONNECTIONS</span><span class="info-val" id="inf-conn">—</span></div>
  <div class="info-row"><span>TYPE</span><span class="info-val" id="inf-type">—</span></div>
  <div class="info-row"><span>STRENGTH</span><span class="info-val" id="inf-str">—</span></div>
</div>

<!-- AI Status -->
<div id="ai-status">[ AI ANALYZING CONNECTIONS... ]</div>

<!-- Corners -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Legend -->
<div id="legend">
  <div class="legend-item"><span>CORE NODE</span><div class="legend-dot" style="background:#00ffcc;box-shadow:0 0 6px #00ffcc"></div></div>
  <div class="legend-item"><span>AI NODE</span><div class="legend-dot" style="background:#b400ff;box-shadow:0 0 6px #b400ff"></div></div>
  <div class="legend-item"><span>CONCEPT NODE</span><div class="legend-dot" style="background:#ff6600;box-shadow:0 0 6px #ff6600"></div></div>
  <div style="margin-top:8px;color:rgba(0,255,204,0.3)">DRAG: ROTATE | SCROLL: ZOOM<br>CLICK: SELECT | DBL-CLICK: ADD</div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Add Node Modal -->
<div id="modal">
  <h3>// ADD_NODE</h3>
  <input type="text" id="node-label" placeholder="NODE LABEL..." maxlength="20">
  <select id="node-type" style="width:100%;background:rgba(0,255,204,0.05);border:1px solid rgba(0,255,204,0.4);color:#00ffcc;font-family:'Share Tech Mono',monospace;font-size:13px;padding:10px;margin-bottom:12px;outline:none;">
    <option value="core">CORE NODE</option>
    <option value="ai">AI NODE</option>
    <option value="concept">CONCEPT NODE</option>
  </select>
  <div class="modal-btns">
    <button class="ctrl-btn" onclick="addNode()" style="flex:1">CREATE</button>
    <button class="ctrl-btn danger" onclick="closeModal()" style="flex:1">CANCEL</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== SCENE SETUP ====================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000308, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 80);

// Fog
scene.fog = new THREE.FogExp2(0x000308, 0.008);

// ==================== ORBIT CONTROLS ====================
let isDragging = false, mouseButton = -1;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 2, radius: 80 };
let targetSpherical = { ...spherical };
let panOffset = new THREE.Vector3();
let targetPan = new THREE.Vector3();

canvas.addEventListener('mousedown', e => {
  isDragging = true; mouseButton = e.button;
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('mouseup', () => { isDragging = false; mouseButton = -1; });
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  if (mouseButton === 0) {
    targetSpherical.theta -= dx * 0.005;
    targetSpherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, targetSpherical.phi + dy * 0.005));
  } else if (mouseButton === 2) {
    const speed = targetSpherical.radius * 0.001;
    targetPan.x -= dx * speed;
    targetPan.y += dy * speed;
  }
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('wheel', e => {
  targetSpherical.radius = Math.max(20, Math.min(200, targetSpherical.radius + e.deltaY * 0.05));
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Double click to add node
canvas.addEventListener('dblclick', e => {
  if (e.target === canvas) openModal();
});

// ==================== DATA ====================
let nodes = [], links = [], nodeIdCounter = 0;
let selectedNode = null;
let signalsEnabled = true;
let signals = [];

const NODE_COLORS = {
  core: new THREE.Color(0x00ffcc),
  ai:   new THREE.Color(0xb400ff),
  concept: new THREE.Color(0xff6600)
};

const NODE_EMISSIVE = {
  core: new THREE.Color(0x004433),
  ai:   new THREE.Color(0x2a0044),
  concept: new THREE.Color(0x331100)
};

// ==================== GRID ====================
function createGrid() {
  const size = 200, divisions = 20;
  const geometry = new THREE.BufferGeometry();
  const verts = [];
  const step = size / divisions;
  const half = size / 2;
  for (let i = 0; i <= divisions; i++) {
    const p = -half + i * step;
    verts.push(-half, -40, p, half, -40, p);
    verts.push(p, -40, -half, p, -40, half);
  }
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  const mat = new THREE.LineBasicMaterial({ color: 0x001a14, opacity: 0.4, transparent: true });
  scene.add(new THREE.LineSegments(geometry, mat));
}
createGrid();

// Starfield
function createStars() {
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for (let i = 0; i < 800; i++) {
    pos.push((Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400, (Math.random() - 0.5) * 400);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0x002244, size: 0.3 });
  scene.add(new THREE.Points(geo, mat));
}
createStars();

// ==================== NODE CREATION ====================
function createNodeMesh(type) {
  const group = new THREE.Group();

  // Core sphere
  const geo = new THREE.SphereGeometry(1.8, 16, 16);
  const mat = new THREE.MeshPhongMaterial({
    color: NODE_COLORS[type],
    emissive: NODE_EMISSIVE[type],
    transparent: true,
    opacity: 0.85,
    shininess: 100,
  });
  const sphere = new THREE.Mesh(geo, mat);
  group.add(sphere);

  // Wireframe ring
  const ringGeo = new THREE.TorusGeometry(2.5, 0.08, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: NODE_COLORS[type], transparent: true, opacity: 0.5 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  group.add(ring);

  // Outer glow (larger transparent sphere)
  const glowGeo = new THREE.SphereGeometry(3.2, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: NODE_COLORS[type],
    transparent: true,
    opacity: 0.06,
    side: THREE.BackSide
  });
  group.add(new THREE.Mesh(glowGeo, glowMat));

  group.userData = { sphere, ring, ringMat, mat, type, baseY: 0, phase: Math.random() * Math.PI * 2 };
  return group;
}

function addNode(label, type, position) {
  closeModal();
  const lbl = label || document.getElementById('node-label').value.trim() || 'NODE_' + nodeIdCounter;
  const typ = type || document.getElementById('node-type').value;
  document.getElementById('node-label').value = '';

  const pos = position || {
    x: (Math.random() - 0.5) * 60,
    y: (Math.random() - 0.5) * 40,
    z: (Math.random() - 0.5) * 40
  };

  const mesh = createNodeMesh(typ);
  mesh.position.set(pos.x, pos.y, pos.z);
  mesh.userData.id = nodeIdCounter;
  mesh.userData.label = lbl;
  mesh.userData.baseY = pos.y;
  scene.add(mesh);

  nodes.push({ id: nodeIdCounter, label: lbl, type: typ, mesh, connections: 0 });
  nodeIdCounter++;
  updateHUD();

  // Auto-link to nearest if not first
  if (nodes.length > 1 && nodes.length <= 3) {
    const target = nodes[nodes.length - 2];
    createLink(nodes[nodes.length - 1], target);
  }
}

// ==================== LINK CREATION ====================
const linkGroup = new THREE.Group();
scene.add(linkGroup);

function createLink(a, b) {
  if (links.find(l => (l.a.id === a.id && l.b.id === b.id) || (l.a.id === b.id && l.b.id === a.id))) return;

  const points = [a.mesh.position.clone(), b.mesh.position.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({
    color: 0x00ffcc,
    transparent: true,
    opacity: 0.25
  });
  const line = new THREE.Line(geo, mat);
  linkGroup.add(line);

  links.push({ a, b, line, mat, geo });
  a.connections++;
  b.connections++;
  updateHUD();
}

function updateLinks() {
  for (const link of links) {
    const pts = [link.a.mesh.position.clone(), link.b.mesh.position.clone()];
    link.geo.setFromPoints(pts);
    link.geo.attributes.position.needsUpdate = true;
  }
}

// ==================== SIGNALS ====================
function createSignal(link) {
  const geo = new THREE.SphereGeometry(0.3, 8, 8);
  const col = Math.random() < 0.5 ? 0x00ffcc : 0xff00ff;
  const mat = new THREE.MeshBasicMaterial({ color: col });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  // Glow
  const gGeo = new THREE.SphereGeometry(0.6, 8, 8);
  const gMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.3 });
  const glow = new THREE.Mesh(gGeo, gMat);
  mesh.add(glow);

  signals.push({ mesh, link, t: Math.random(), speed: 0.003 + Math.random() * 0.004, dir: Math.random() < 0.5 ? 1 : -1 });
}

function updateSignals(delta) {
  if (!signalsEnabled) return;
  for (const s of signals) {
    s.t += s.speed * s.dir;
    if (s.t > 1) { s.t = 1; s.dir = -1; }
    if (s.t < 0) { s.t = 0; s.dir = 1; }
    const a = s.link.a.mesh.position;
    const b = s.link.b.mesh.position;
    s.mesh.position.lerpVectors(a, b, s.t);
  }
}

function toggleSignals() {
  signalsEnabled = !signalsEnabled;
  for (const s of signals) s.mesh.visible = signalsEnabled;
}

function spawnSignals() {
  for (const l of links) {
    if (Math.random() < 0.7) createSignal(l);
  }
}

// ==================== LIGHTING ====================
scene.add(new THREE.AmbientLight(0x001122, 2));
const pLight1 = new THREE.PointLight(0x00ffcc, 2, 150);
pLight1.position.set(30, 30, 30);
scene.add(pLight1);
const pLight2 = new THREE.PointLight(0xff00ff, 1.5, 150);
pLight2.position.set(-30, -20, -30);
scene.add(pLight2);
const pLight3 = new THREE.PointLight(0xb400ff, 1, 100);
pLight3.position.set(0, 40, -40);
scene.add(pLight3);

// ==================== RAYCASTER ====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoverNode = null;
let linkSource = null;

canvas.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const meshes = nodes.map(n => n.mesh.children[0]);
  const hits = raycaster.intersectObjects(meshes);

  const tooltip = document.getElementById('tooltip');
  if (hits.length > 0) {
    const nodeGroup = hits[0].object.parent;
    const n = nodes.find(n => n.mesh === nodeGroup);
    if (n) {
      hoverNode = n;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 20) + 'px';
      tooltip.textContent = n.label;
      canvas.style.cursor = 'pointer';
    }
  } else {
    hoverNode = null;
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('click', e => {
  if (isDragging) return;
  raycaster.setFromCamera(mouse, camera);
  const meshes = nodes.map(n => n.mesh.children[0]);
  const hits = raycaster.intersectObjects(meshes);

  if (hits.length > 0) {
    const nodeGroup = hits[0].object.parent;
    const n = nodes.find(n => n.mesh === nodeGroup);
    if (n) {
      if (linkSource && linkSource.id !== n.id) {
        createLink(linkSource, n);
        spawnSignalsForLink(links[links.length - 1]);
        linkSource = null;
        document.getElementById('ai-status').textContent = '[ LINK ESTABLISHED ]';
        showAIStatus('[ LINK ESTABLISHED ]');
        selectNode(n);
      } else {
        linkSource = n;
        selectNode(n);
        showAIStatus('[ SELECT TARGET NODE TO LINK ]');
      }
    }
  } else {
    selectedNode = null;
    linkSource = null;
    clearInfoPanel();
  }
});

function spawnSignalsForLink(link) {
  for (let i = 0; i < 3; i++) createSignal(link);
}

function selectNode(n) {
  selectedNode = n;
  document.getElementById('inf-id').textContent = 'N_' + String(n.id).padStart(3, '0');
  document.getElementById('inf-label').textContent = n.label;
  document.getElementById('inf-conn').textContent = n.connections;
  document.getElementById('inf-type').textContent = n.type.toUpperCase();
  document.getElementById('inf-str').textContent = (Math.random() * 0.6 + 0.4).toFixed(2);
}

function clearInfoPanel() {
  ['inf-id','inf-label','inf-conn','inf-type','inf-str'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
}

// ==================== DELETE ====================
function deleteSelected() {
  if (!selectedNode) return;
  scene.remove(selectedNode.mesh);

  // Remove links
  links = links.filter(l => {
    if (l.a.id === selectedNode.id || l.b.id === selectedNode.id) {
      linkGroup.remove(l.line);
      // remove signals for this link
      signals = signals.filter(s => {
        if (s.link === l) { scene.remove(s.mesh); return false; }
        return true;
      });
      return false;
    }
    return true;
  });

  nodes = nodes.filter(n => n.id !== selectedNode.id);
  selectedNode = null;
  clearInfoPanel();
  updateHUD();
}

// ==================== AI CONNECT ====================
function aiConnect() {
  if (nodes.length < 2) return;
  showAIStatus('[ AI ANALYZING NEURAL PATHWAYS... ]');

  setTimeout(() => {
    // Find unconnected or weakly connected pairs
    const pairs = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const exists = links.find(l =>
          (l.a.id === nodes[i].id && l.b.id === nodes[j].id) ||
          (l.a.id === nodes[j].id && l.b.id === nodes[i].id)
        );
        if (!exists) pairs.push([nodes[i], nodes[j]]);
      }
    }

    if (pairs.length === 0) {
      showAIStatus('[ ALL NODES FULLY CONNECTED ]');
      return;
    }

    // Connect 2-3 random pairs
    const count = Math.min(3, pairs.length);
    const chosen = pairs.sort(() => Math.random() - 0.5).slice(0, count);
    chosen.forEach(([a, b]) => {
      createLink(a, b);
      spawnSignalsForLink(links[links.length - 1]);
    });

    showAIStatus(`[ AI ESTABLISHED ${count} NEW CONNECTIONS ]`);
  }, 1200);
}

// ==================== AUTO LAYOUT ====================
function autoLayout() {
  const n = nodes.length;
  if (n === 0) return;

  // Force-directed positioning in 3D
  for (let iter = 0; iter < 50; iter++) {
    for (let i = 0; i < n; i++) {
      const force = new THREE.Vector3();
      // Repulsion from all nodes
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const diff = nodes[i].mesh.position.clone().sub(nodes[j].mesh.position);
        const dist = Math.max(diff.length(), 0.1);
        diff.normalize().multiplyScalar(200 / (dist * dist));
        force.add(diff);
      }
      // Attraction along links
      for (const l of links) {
        if (l.a.id === nodes[i].id) {
          const diff = l.b.mesh.position.clone().sub(nodes[i].mesh.position);
          force.add(diff.multiplyScalar(0.01));
        }
        if (l.b.id === nodes[i].id) {
          const diff = l.a.mesh.position.clone().sub(nodes[i].mesh.position);
          force.add(diff.multiplyScalar(0.01));
        }
      }
      // Center pull
      force.add(nodes[i].mesh.position.clone().negate().multiplyScalar(0.005));
      nodes[i].mesh.position.add(force.multiplyScalar(0.3));
    }
  }
  for (const n of nodes) n.mesh.userData.baseY = n.mesh.position.y;
}

// ==================== RESET CAMERA ====================
function resetCamera() {
  targetSpherical = { theta: 0, phi: Math.PI / 2, radius: 80 };
  targetPan.set(0, 0, 0);
}

// ==================== MODAL ====================
function openModal() {
  document.getElementById('modal').style.display = 'block';
  document.getElementById('node-label').focus();
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}
document.getElementById('node-label').addEventListener('keydown', e => {
  if (e.key === 'Enter') addNode();
  if (e.key === 'Escape') closeModal();
});

// ==================== AI STATUS ====================
let aiTimer;
function showAIStatus(msg) {
  const el = document.getElementById('ai-status');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(aiTimer);
  aiTimer = setTimeout(() => el.classList.remove('visible'), 3000);
}

// ==================== HUD ====================
function updateHUD() {
  document.getElementById('nc').textContent = nodes.length;
  document.getElementById('lc').textContent = links.length;
}

// ==================== ANIMATE ====================
let time = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  time += delta;

  // Smooth camera
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.06;
  spherical.phi   += (targetSpherical.phi   - spherical.phi)   * 0.06;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.06;
  panOffset.lerp(targetPan, 0.06);

  camera.position.set(
    spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    spherical.radius * Math.cos(spherical.phi),
    spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta)
  ).add(panOffset);
  camera.lookAt(panOffset);

  // Animate nodes
  for (const n of nodes) {
    const d = n.mesh.userData;
    // Float
    n.mesh.position.y = d.baseY + Math.sin(time * 0.8 + d.phase) * 0.4;
    // Rotate ring
    d.ring.rotation.z = time * 0.5 + d.phase;
    d.ring.rotation.x = time * 0.3 + d.phase;

    // Pulse selected
    if (selectedNode && n.id === selectedNode.id) {
      const pulse = 1 + Math.sin(time * 4) * 0.15;
      n.mesh.scale.setScalar(pulse);
      d.mat.emissiveIntensity = 0.5 + Math.sin(time * 4) * 0.3;
    } else if (linkSource && n.id === linkSource.id) {
      const pulse = 1 + Math.sin(time * 6) * 0.2;
      n.mesh.scale.setScalar(pulse);
    } else {
      n.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
    }
  }

  // Animate lights
  pLight1.position.set(
    Math.sin(time * 0.3) * 50,
    Math.cos(time * 0.2) * 30 + 20,
    Math.cos(time * 0.3) * 50
  );
  pLight2.position.set(
    Math.cos(time * 0.25) * 50,
    Math.sin(time * 0.15) * 30 - 20,
    Math.sin(time * 0.25) * 50
  );

  updateLinks();
  updateSignals(delta);

  renderer.render(scene, camera);
}

// ==================== WINDOW RESIZE ====================

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
