<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Mind Map v2 // LAYERED ARCHITECTURE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --cyan:   #00ffe7;
  --magenta:#ff2df7;
  --purple: #8b2fff;
  --orange: #ff8c00;
  --bg:     #00030a;
  --panel:  rgba(0,8,20,0.88);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }

#c { display:block; width:100%; height:100%; }

/* ─── SCANLINES ─────────────────────────────────── */
#scanlines {
  position:fixed; inset:0; pointer-events:none; z-index:4;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,255,231,0.018) 3px, rgba(0,255,231,0.018) 4px
  );
}

/* ─── TOPBAR ─────────────────────────────────────── */
#topbar {
  position:fixed; top:0; left:0; right:0; height:52px;
  background:linear-gradient(180deg, rgba(0,3,10,0.95) 0%, transparent 100%);
  border-bottom:1px solid rgba(0,255,231,0.15);
  display:flex; align-items:center; gap:18px;
  padding:0 22px; z-index:20;
}
#logo {
  font-family:'Orbitron',monospace; font-weight:900;
  font-size:13px; letter-spacing:5px; color:var(--cyan);
  text-shadow:0 0 18px var(--cyan),0 0 40px var(--cyan);
  animation: glitch 6s infinite;
}
@keyframes glitch {
  0%,88%,100% { text-shadow:0 0 18px var(--cyan),0 0 40px var(--cyan); }
  90% { text-shadow:-3px 0 var(--magenta), 3px 0 #00ffee; clip-path:inset(20% 0 40% 0); }
  92% { text-shadow: 3px 0 var(--magenta),-3px 0 #00ffee; clip-path:inset(60% 0 10% 0); }
  94% { text-shadow:0 0 18px var(--cyan); clip-path:none; }
}
.sep { flex:1; height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,255,231,0.25),rgba(255,45,247,0.2),transparent); }
#hud-stats {
  font-family:'Share Tech Mono',monospace; font-size:11px;
  letter-spacing:2px; color:rgba(0,255,231,0.55);
  display:flex; gap:18px;
}
.hv { color:var(--cyan); text-shadow:0 0 8px var(--cyan); }

/* ─── SIDE PANEL ─────────────────────────────────── */
#panel {
  position:fixed; left:18px; top:68px;
  display:flex; flex-direction:column; gap:7px; z-index:20;
}
.btn {
  background:rgba(0,255,231,0.04);
  border:1px solid rgba(0,255,231,0.3);
  color:var(--cyan); font-family:'Share Tech Mono',monospace;
  font-size:10px; letter-spacing:2.5px; padding:9px 15px;
  cursor:pointer; transition:all .18s; position:relative;
  overflow:hidden; white-space:nowrap; text-transform:uppercase;
}
.btn::after { content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,255,231,0.07),transparent);
  transform:translateX(-100%); transition:transform .35s; }
.btn:hover::after { transform:translateX(100%); }
.btn:hover { border-color:var(--cyan); box-shadow:0 0 14px rgba(0,255,231,0.25);
  background:rgba(0,255,231,0.09); }
.btn.mg { border-color:rgba(255,45,247,0.3); color:var(--magenta); }
.btn.mg:hover { border-color:var(--magenta); box-shadow:0 0 14px rgba(255,45,247,0.25);
  background:rgba(255,45,247,0.07); }
.btn.pu { border-color:rgba(139,47,255,0.3); color:var(--purple); }
.btn.pu:hover { border-color:var(--purple); box-shadow:0 0 14px rgba(139,47,255,0.25);
  background:rgba(139,47,255,0.07); }
.btn.or { border-color:rgba(255,140,0,0.35); color:var(--orange); }
.btn.or:hover { border-color:var(--orange); box-shadow:0 0 14px rgba(255,140,0,0.22);
  background:rgba(255,140,0,0.07); }

/* ─── INFO PANEL ─────────────────────────────────── */
#info {
  position:fixed; right:18px; top:68px; width:210px;
  background:var(--panel); border:1px solid rgba(0,255,231,0.18);
  padding:14px; z-index:20; font-family:'Share Tech Mono',monospace;
}
#info::before { content:'// NODE_STATE';
  display:block; font-size:9px; letter-spacing:3px;
  color:var(--magenta); margin-bottom:10px;
  border-bottom:1px solid rgba(255,45,247,0.2); padding-bottom:6px; }
.ir { display:flex; justify-content:space-between;
  font-size:10px; color:rgba(0,255,231,0.45); margin-bottom:5px; }
.iv { color:var(--cyan); text-shadow:0 0 6px var(--cyan); }

/* ─── ACTIVATION BAR ─────────────────────────────── */
#actbar-wrap { margin-top:10px; }
#actbar-label { font-size:9px; letter-spacing:2px;
  color:rgba(0,255,231,0.4); margin-bottom:4px; }
#actbar-bg { width:100%; height:6px; background:rgba(0,255,231,0.08);
  border:1px solid rgba(0,255,231,0.15); }
#actbar { height:100%; width:0%; transition:width .4s;
  background:linear-gradient(90deg,var(--purple),var(--cyan)); }

/* ─── LAYER LEGEND ───────────────────────────────── */
#legend {
  position:fixed; right:18px; bottom:18px;
  font-family:'Share Tech Mono',monospace;
  font-size:10px; letter-spacing:1.5px; z-index:20;
  color:rgba(0,255,231,0.4); text-align:right; line-height:1.9;
}
.ld { display:flex; align-items:center; gap:7px; justify-content:flex-end; }
.ldot { width:9px; height:9px; border-radius:50%; }
#hint { margin-top:8px; color:rgba(0,255,231,0.22); font-size:9px; line-height:1.7; }

/* ─── MODAL ──────────────────────────────────────── */
#modal {
  display:none; position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,3,12,0.97);
  border:1px solid var(--cyan);
  box-shadow:0 0 50px rgba(0,255,231,0.2),inset 0 0 30px rgba(0,255,231,0.02);
  padding:28px 30px; z-index:100; min-width:300px;
  font-family:'Share Tech Mono',monospace;
}
#modal h3 { font-family:'Orbitron',monospace; font-size:11px;
  letter-spacing:4px; color:var(--cyan); text-shadow:0 0 12px var(--cyan);
  margin-bottom:18px; }
#modal input, #modal select {
  width:100%; background:rgba(0,255,231,0.04);
  border:1px solid rgba(0,255,231,0.3);
  color:var(--cyan); font-family:'Share Tech Mono',monospace;
  font-size:12px; padding:9px 11px; margin-bottom:10px; outline:none;
}
#modal input:focus, #modal select:focus { border-color:var(--cyan); }
#modal select option { background:#000a18; }
.mbtns { display:flex; gap:9px; }
.mbtns .btn { flex:1; }

/* ─── STATUS BAR ─────────────────────────────────── */
#status {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  font-family:'Share Tech Mono',monospace; font-size:11px;
  letter-spacing:3px; color:var(--purple);
  text-shadow:0 0 12px var(--purple);
  z-index:20; opacity:0; transition:opacity .3s;
  white-space:nowrap;
}
#status.on { opacity:1; }

/* corners */
.cor { position:fixed; width:36px; height:36px;
  pointer-events:none; z-index:15; }
.cor.tl { top:58px; left:10px;
  border-top:1px solid rgba(0,255,231,0.22);
  border-left:1px solid rgba(0,255,231,0.22); }
.cor.tr { top:58px; right:10px;
  border-top:1px solid rgba(0,255,231,0.22);
  border-right:1px solid rgba(0,255,231,0.22); }
.cor.bl { bottom:10px; left:10px;
  border-bottom:1px solid rgba(0,255,231,0.22);
  border-left:1px solid rgba(0,255,231,0.22); }
.cor.br { bottom:10px; right:10px;
  border-bottom:1px solid rgba(0,255,231,0.22);
  border-right:1px solid rgba(0,255,231,0.22); }

/* tooltip */
#tt { position:fixed; background:rgba(0,3,12,0.92);
  border:1px solid rgba(0,255,231,0.3);
  padding:5px 11px; font-family:'Share Tech Mono',monospace;
  font-size:10px; letter-spacing:1px; color:var(--cyan);
  pointer-events:none; z-index:50; display:none; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="scanlines"></div>

<div id="topbar">
  <div id="logo">NEURAL // MIND-MAP</div>
  <div class="sep"></div>
  <div id="hud-stats">
    <span>NEURONS: <span class="hv" id="sN">0</span></span>
    <span>SYNAPSES: <span class="hv" id="sS">0</span></span>
    <span>SIGNALS: <span class="hv" id="sSig">0</span></span>
    <span>LAYER: <span class="hv" id="sL">-</span></span>
  </div>
</div>

<div id="panel">
  <button class="btn"    onclick="UI.openModal()">＋ ADD NEURON</button>
  <button class="btn mg" onclick="UI.deleteSelected()">✕ REMOVE</button>
  <button class="btn pu" onclick="Brain.pulse()">▶ FIRE PULSE</button>
  <button class="btn pu" onclick="Brain.forwardPass()">⚡ FORWARD PASS</button>
  <button class="btn or" onclick="Brain.toggleSignals()">◎ SIGNALS</button>
  <button class="btn"    onclick="Visual.resetCamera()">⊙ RESET CAM</button>
  <button class="btn"    onclick="Brain.autoLayout()">⊞ LAYOUT</button>
</div>

<div id="info">
  <div class="ir"><span>ID</span>     <span class="iv" id="iId">—</span></div>
  <div class="ir"><span>LABEL</span>  <span class="iv" id="iLb">—</span></div>
  <div class="ir"><span>LAYER</span>  <span class="iv" id="iLy">—</span></div>
  <div class="ir"><span>WEIGHT</span> <span class="iv" id="iW">—</span></div>
  <div class="ir"><span>BIAS</span>   <span class="iv" id="iBi">—</span></div>
  <div class="ir"><span>CONNS</span>  <span class="iv" id="iCo">—</span></div>
  <div id="actbar-wrap">
    <div id="actbar-label">ACTIVATION</div>
    <div id="actbar-bg"><div id="actbar"></div></div>
  </div>
</div>

<div id="legend">
  <div class="ld"><span>INPUT LAYER</span>  <div class="ldot" style="background:#00ffe7;box-shadow:0 0 7px #00ffe7"></div></div>
  <div class="ld"><span>HIDDEN LAYER</span> <div class="ldot" style="background:#8b2fff;box-shadow:0 0 7px #8b2fff"></div></div>
  <div class="ld"><span>OUTPUT LAYER</span> <div class="ldot" style="background:#ff2df7;box-shadow:0 0 7px #ff2df7"></div></div>
  <div id="hint">DRAG: ROTATE<br>SCROLL: ZOOM<br>CLICK: SELECT<br>DBL-CLICK: ADD</div>
</div>

<div class="cor tl"></div><div class="cor tr"></div>
<div class="cor bl"></div><div class="cor br"></div>

<div id="tt"></div>
<div id="status"></div>

<div id="modal">
  <h3>// CREATE_NEURON</h3>
  <input id="mLabel" type="text" placeholder="LABEL..." maxlength="18">
  <select id="mLayer">
    <option value="input">INPUT LAYER</option>
    <option value="hidden" selected>HIDDEN LAYER</option>
    <option value="output">OUTPUT LAYER</option>
  </select>
  <div class="mbtns">
    <button class="btn" onclick="UI.confirmAdd()">CREATE</button>
    <button class="btn mg" onclick="UI.closeModal()">CANCEL</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

/* ══════════════════════════════════════════════════════════
   ██  LOGIC LAYER  —  knows NOTHING about Three.js
   ══════════════════════════════════════════════════════════ */

class Neuron {
  constructor(id, label, layerType) {
    this.id        = id;
    this.label     = label;
    this.layerType = layerType;          // 'input' | 'hidden' | 'output'
    this.weight    = parseFloat((Math.random() * 2 - 1).toFixed(3));
    this.bias      = parseFloat((Math.random() * 0.5).toFixed(3));
    this.activation = 0;
    this.connections = 0;               // outgoing synapse count
    this.onActivate  = null;            // callback → Visual layer listens here
  }

  activate(rawInput) {
    // sigmoid activation
    const x = rawInput * this.weight + this.bias;
    this.activation = 1 / (1 + Math.exp(-x));
    if (this.onActivate) this.onActivate(this.activation);
    return this.activation;
  }

  fire(value = 1) {
    return this.activate(value);
  }
}

class Synapse {
  constructor(id, from, to) {
    this.id       = id;
    this.from     = from;               // Neuron
    this.to       = to;                 // Neuron
    this.weight   = parseFloat((Math.random() * 2 - 1).toFixed(3));
    this.onSignal = null;               // callback → Visual layer listens
  }

  transmit(value) {
    const signal = value * this.weight;
    if (this.onSignal) this.onSignal(signal);
    return this.to.activate(signal);
  }
}

class Network {
  constructor() {
    this.neurons  = [];
    this.synapses = [];
    this._nId = 0;
    this._sId = 0;
    this.onNeuronAdded   = null;
    this.onSynapseAdded  = null;
    this.onNeuronRemoved = null;
  }

  addNeuron(label, layerType) {
    const n = new Neuron(this._nId++, label, layerType);
    this.neurons.push(n);
    if (this.onNeuronAdded) this.onNeuronAdded(n);
    return n;
  }

  connect(fromNeuron, toNeuron) {
    if (this.synapses.find(s =>
        s.from.id === fromNeuron.id && s.to.id === toNeuron.id)) return null;
    const s = new Synapse(this._sId++, fromNeuron, toNeuron);
    this.synapses.push(s);
    fromNeuron.connections++;
    if (this.onSynapseAdded) this.onSynapseAdded(s);
    return s;
  }

  removeNeuron(id) {
    const n = this.neurons.find(n => n.id === id);
    if (!n) return;
    this.synapses = this.synapses.filter(s => {
      if (s.from.id === id || s.to.id === id) {
        if (this.onSynapseAdded) { /* handled by Visual */ }
        return false;
      }
      return true;
    });
    this.neurons = this.neurons.filter(n => n.id !== id);
    if (this.onNeuronRemoved) this.onNeuronRemoved(id);
  }

  // Forward pass: propagate from all input neurons
  forwardPass() {
    const inputs = this.neurons.filter(n => n.layerType === 'input');
    inputs.forEach(n => {
      const val = n.fire(Math.random());
      this.synapses.filter(s => s.from.id === n.id)
        .forEach(s => s.transmit(val));
    });
    // ripple hidden → output
    const hidden = this.neurons.filter(n => n.layerType === 'hidden');
    hidden.forEach(n => {
      const inSyns = this.synapses.filter(s => s.to.id === n.id);
      if (inSyns.length === 0) return;
      const sumInput = inSyns.reduce((a, s) => a + s.from.activation, 0) / inSyns.length;
      const val = n.fire(sumInput);
      this.synapses.filter(s => s.from.id === n.id)
        .forEach(s => s.transmit(val));
    });
  }
}

/* ══════════════════════════════════════════════════════════
   ██  VISUAL LAYER  —  Three.js. Listens to Network events.
   ══════════════════════════════════════════════════════════ */

const Visual = (() => {
  const canvas   = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x00030a, 1);

  const scene  = new THREE.Scene();
  scene.fog    = new THREE.FogExp2(0x00030a, 0.007);
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 800);
  camera.position.set(0, 0, 90);

  /* ── Lights ── */
  scene.add(new THREE.AmbientLight(0x000d1a, 3));
  const pl1 = new THREE.PointLight(0x00ffe7, 2.5, 200); pl1.position.set(40,40,40); scene.add(pl1);
  const pl2 = new THREE.PointLight(0xff2df7, 2,   160); pl2.position.set(-40,-30,-40); scene.add(pl2);
  const pl3 = new THREE.PointLight(0x8b2fff, 1.5, 120); pl3.position.set(0,50,-50); scene.add(pl3);

  /* ── Background grid ── */
  (function makeGrid(){
    const sz=200, div=24, step=sz/div, half=sz/2;
    const verts=[];
    for(let i=0;i<=div;i++){
      const p=-half+i*step;
      verts.push(-half,-42,p, half,-42,p);
      verts.push(p,-42,-half, p,-42,half);
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
    scene.add(new THREE.LineSegments(g,
      new THREE.LineBasicMaterial({color:0x001812,opacity:.35,transparent:true})));
  })();

  /* ── Stars ── */
  (function makeStars(){
    const pos=[];
    for(let i=0;i<1000;i++)
      pos.push((Math.random()-.5)*500,(Math.random()-.5)*500,(Math.random()-.5)*500);
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x002233,size:.25})));
  })();

  /* ── Node colors per layer ── */
  const LAYER_COL = {
    input:  new THREE.Color(0x00ffe7),
    hidden: new THREE.Color(0x8b2fff),
    output: new THREE.Color(0xff2df7),
  };
  const LAYER_EMI = {
    input:  new THREE.Color(0x003330),
    hidden: new THREE.Color(0x1a0040),
    output: new THREE.Color(0x330022),
  };

  /* ── Neuron mesh map: neuron.id → { group, sphere, ring, mat, ringMat } ── */
  const meshMap  = new Map();
  /* ── Synapse map: synapse.id → { line, tube? } ── */
  const synapseMap = new Map();

  /* ── Signal particles ── */
  const signalPool = [];
  let   signalsOn  = true;

  /* ── SHADER for synapse lines ──
       Uniform `uProgress` slides a bright patch along the line (0→1).
       When no signal: dim glow. When signal fires: bright wave. */
  function makeSynapseMaterial(col) {
    return new THREE.ShaderMaterial({
      uniforms: {
        uColor:    { value: col.clone() },
        uProgress: { value: -1.0 },    // -1 = idle
        uTime:     { value: 0.0 },
      },
      vertexShader: `
        attribute float aT;          // 0..1 along tube
        varying float vT;
        void main() {
          vT = aT;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }
      `,
      fragmentShader: `
        uniform vec3  uColor;
        uniform float uProgress;
        uniform float uTime;
        varying float vT;
        void main() {
          // base dim glow
          float base = 0.12 + 0.04 * sin(vT * 12.0 - uTime * 3.0);
          // signal wave (Gaussian envelope travelling along uProgress)
          float d    = abs(vT - uProgress);
          float wave = uProgress < 0.0 ? 0.0 : exp(-d * d * 80.0);
          float alpha = base + wave * 0.9;
          gl_FragColor = vec4(uColor * (base + wave), alpha);
        }
      `,
      transparent: true,
      depthWrite:  false,
    });
  }

  /* ── Build tube geometry between two Vector3 points ── */
  function buildTube(a, b) {
    const mid = a.clone().lerp(b, 0.5)
      .add(new THREE.Vector3(
        (Math.random()-.5)*4,
        (Math.random()-.5)*4,
        (Math.random()-.5)*4));
    const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
    const pts   = curve.getPoints(30);
    const geo   = new THREE.BufferGeometry().setFromPoints(pts);
    // add aT attribute
    const tArr  = new Float32Array(pts.length);
    pts.forEach((_,i) => tArr[i] = i/(pts.length-1));
    geo.setAttribute('aT', new THREE.BufferAttribute(tArr, 1));
    return { geo, curve, pts };
  }

  /* ── Create neuron mesh ── */
  function addNeuronMesh(neuron, position) {
    const col = LAYER_COL[neuron.layerType];
    const emi = LAYER_EMI[neuron.layerType];
    const group = new THREE.Group();
    group.position.copy(position);

    // Core sphere
    const mat = new THREE.MeshPhongMaterial({
      color:col, emissive:emi, shininess:120,
      transparent:true, opacity:.88,
    });
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(1.9,20,20), mat);
    group.add(sphere);

    // Outer glow shell
    const glowMat = new THREE.MeshBasicMaterial({
      color:col, transparent:true, opacity:.06, side:THREE.BackSide,
    });
    group.add(new THREE.Mesh(new THREE.SphereGeometry(3.4,16,16), glowMat));

    // Equatorial ring
    const ringMat = new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.45});
    const ring    = new THREE.Mesh(new THREE.TorusGeometry(2.6,.07,8,36), ringMat);
    ring.rotation.x = Math.PI/2;
    group.add(ring);

    group.userData = {
      neuronId: neuron.id,
      layerType: neuron.layerType,
      mat, ringMat, sphere, ring,
      basePos: position.clone(),
      phase: Math.random()*Math.PI*2,
    };

    // Listen to Logic Layer activation event
    neuron.onActivate = (act) => flashNeuron(group, act);

    scene.add(group);
    meshMap.set(neuron.id, group);
    return group;
  }

  /* ── Activation flash: briefly boost emissive & scale ── */
  function flashNeuron(group, activation) {
    const d = group.userData;
    d.mat.emissiveIntensity = activation * 3.5;
    const s = 1 + activation * 0.5;
    group.scale.setScalar(s);
    setTimeout(()=>{ d.mat.emissiveIntensity=0; group.scale.setScalar(1); }, 400);
  }

  /* ── Create synapse visual ── */
  function addSynapseMesh(synapse) {
    const aMesh = meshMap.get(synapse.from.id);
    const bMesh = meshMap.get(synapse.to.id);
    if (!aMesh || !bMesh) return;

    const col = new THREE.Color(0x00ffe7).lerp(
      new THREE.Color(0x8b2fff), Math.random());

    const { geo, curve } = buildTube(aMesh.position, bMesh.position);
    const mat  = makeSynapseMaterial(col);
    const line = new THREE.Line(geo, mat);
    scene.add(line);

    const entry = { line, mat, geo, curve, aMesh, bMesh };

    // Listen: when synapse fires, animate signal particle + shader wave
    synapse.onSignal = (strength) => {
      fireSignalParticle(entry, col, strength);
      animateShaderWave(mat);
    };

    synapseMap.set(synapse.id, entry);
    return entry;
  }

  /* ── Shader wave animation: slide uProgress 0→1 over 600ms ── */
  function animateShaderWave(mat) {
    let start = null;
    const duration = 700;
    function step(ts) {
      if (!start) start = ts;
      const t = Math.min((ts - start) / duration, 1);
      mat.uniforms.uProgress.value = t;
      if (t < 1) requestAnimationFrame(step);
      else setTimeout(()=>{ mat.uniforms.uProgress.value = -1; }, 100);
    }
    requestAnimationFrame(step);
  }

  /* ── Signal particle: small sphere travelling A→B via lerp ── */
  function fireSignalParticle(synapseEntry, col, strength) {
    if (!signalsOn) return;
    const geo  = new THREE.SphereGeometry(0.28+Math.abs(strength)*.15, 8, 8);
    const mat  = new THREE.MeshBasicMaterial({color:col});
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    // Glow halo
    const gm = new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.28,side:THREE.BackSide});
    mesh.add(new THREE.Mesh(new THREE.SphereGeometry(.55,8,8),gm));

    const pts = synapseEntry.curve.getPoints(60);
    let i = 0;
    const interval = setInterval(()=>{
      if (i >= pts.length) {
        clearInterval(interval);
        scene.remove(mesh);
        return;
      }
      mesh.position.copy(pts[i]);
      i += 2;
    }, 14);

    signalPool.push({ mesh, done: false });
    document.getElementById('sSig').textContent = signalPool.filter(s=>!s.done).length;
  }

  /* ── Remove neuron visual ── */
  function removeNeuronMesh(id) {
    const g = meshMap.get(id);
    if (g) { scene.remove(g); meshMap.delete(id); }
    // remove synapses visually
    synapseMap.forEach((entry, sId) => {
      if (entry.aMesh === g || entry.bMesh === g) {
        scene.remove(entry.line);
        synapseMap.delete(sId);
      }
    });
  }

  /* ── Camera orbit ── */
  let isDrag=false, btn=-1, prevM={x:0,y:0};
  let sph = {t:0, p:Math.PI/2, r:90};
  let tSph= {...sph};
  let pan =new THREE.Vector3(), tPan=new THREE.Vector3();

  canvas.addEventListener('mousedown', e=>{isDrag=true;btn=e.button;prevM={x:e.clientX,y:e.clientY};});
  canvas.addEventListener('mouseup',   ()=>{isDrag=false;btn=-1;});
  canvas.addEventListener('wheel',     e=>{ tSph.r=Math.max(18,Math.min(220,tSph.r+e.deltaY*.06)); });
  canvas.addEventListener('contextmenu',e=>e.preventDefault());
  canvas.addEventListener('mousemove', e=>{
    if (!isDrag) return;
    const dx=e.clientX-prevM.x, dy=e.clientY-prevM.y;
    if (btn===0){
      tSph.t -= dx*.005;
      tSph.p  = Math.max(.08,Math.min(Math.PI-.08,tSph.p+dy*.005));
    } else if (btn===2){
      const sp=tSph.r*.001;
      tPan.x-=dx*sp; tPan.y+=dy*sp;
    }
    prevM={x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener('dblclick',()=>UI.openModal());

  function resetCamera(){
    tSph={t:0,p:Math.PI/2,r:90}; tPan.set(0,0,0);
  }

  /* ── Raycaster ── */
  const ray = new THREE.Raycaster();
  const mp  = new THREE.Vector2();
  const tt  = document.getElementById('tt');

  canvas.addEventListener('mousemove', e=>{
    mp.x=(e.clientX/window.innerWidth)*2-1;
    mp.y=-(e.clientY/window.innerHeight)*2+1;
    ray.setFromCamera(mp,camera);
    const hits=ray.intersectObjects([...meshMap.values()].map(g=>g.children[0]));
    if (hits.length){
      const g=hits[0].object.parent;
      tt.style.display='block';
      tt.style.left=(e.clientX+12)+'px';
      tt.style.top=(e.clientY-16)+'px';
      const n=brain.neurons.find(n=>n.id===g.userData.neuronId);
      if(n) tt.textContent=n.label;
    } else {
      tt.style.display='none';
    }
  });

  /* click: select / link */
  canvas.addEventListener('click', e=>{
    mp.x=(e.clientX/window.innerWidth)*2-1;
    mp.y=-(e.clientY/window.innerHeight)*2+1;
    ray.setFromCamera(mp,camera);
    const hits=ray.intersectObjects([...meshMap.values()].map(g=>g.children[0]));
    if (hits.length){
      const g=hits[0].object.parent;
      const n=brain.neurons.find(n=>n.id===g.userData.neuronId);
      if(n) UI.selectNeuron(n);
    } else {
      UI.clearSelection();
    }
  });

  /* ── Main loop ── */
  let time=0;
  const clock=new THREE.Clock();

  function animate(){
    requestAnimationFrame(animate);
    const dt=clock.getDelta(); time+=dt;

    // smooth camera
    sph.t+=(tSph.t-sph.t)*.06; sph.p+=(tSph.p-sph.p)*.06; sph.r+=(tSph.r-sph.r)*.06;
    pan.lerp(tPan,.06);
    camera.position.set(
      sph.r*Math.sin(sph.p)*Math.sin(sph.t),
      sph.r*Math.cos(sph.p),
      sph.r*Math.sin(sph.p)*Math.cos(sph.t)
    ).add(pan);
    camera.lookAt(pan);

    // animate node meshes
    meshMap.forEach((group)=>{
      const d=group.userData;
      group.position.y = d.basePos.y + Math.sin(time*.7+d.phase)*.45;
      d.ring.rotation.z = time*.45+d.phase;
      d.ring.rotation.x = Math.PI/2+Math.sin(time*.3+d.phase)*.3;
    });

    // update shader time uniform
    synapseMap.forEach(({mat})=>{ mat.uniforms.uTime.value=time; });

    // moving lights
    pl1.position.set(Math.sin(time*.25)*55, Math.cos(time*.18)*35+25, Math.cos(time*.25)*55);
    pl2.position.set(Math.cos(time*.2)*55,  Math.sin(time*.14)*35-25, Math.sin(time*.2)*55);

    renderer.render(scene, camera);
  }

  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });

  animate();

  return {
    addNeuronMesh,
    addSynapseMesh,
    removeNeuronMesh,
    resetCamera,
    LAYER_COL,
    getPos: (id)=>{ const g=meshMap.get(id); return g?g.position:null; },
  };
})();

/* ══════════════════════════════════════════════════════════
   ██  BRAIN  —  Orchestrates Logic + Visual
   ══════════════════════════════════════════════════════════ */

const brain = new Network();

// Wire up Logic → Visual callbacks
brain.onNeuronAdded  = (neuron) => {
  const layerX = { input:-28, hidden:0, output:28 };
  const x = layerX[neuron.layerType] + (Math.random()-.5)*10;
  const y = (Math.random()-.5)*36;
  const z = (Math.random()-.5)*36;
  Visual.addNeuronMesh(neuron, new THREE.Vector3(x,y,z));
  updateHUD();
};

brain.onSynapseAdded = (synapse) => {
  Visual.addSynapseMesh(synapse);
  updateHUD();
};

brain.onNeuronRemoved = (id) => {
  Visual.removeNeuronMesh(id);
  updateHUD();
};

const Brain = {
  /* Convenience: connect two neurons by ID */
  connect(aId, bId){
    const a=brain.neurons.find(n=>n.id===aId);
    const b=brain.neurons.find(n=>n.id===bId);
    if(a&&b) brain.connect(a,b);
  },

  /* Single random pulse */
  pulse(){
    if(!brain.neurons.length) return;
    const n=brain.neurons[Math.floor(Math.random()*brain.neurons.length)];
    const val=n.fire(Math.random()*2-1);
    brain.synapses.filter(s=>s.from.id===n.id).forEach(s=>s.transmit(val));
    showStatus(`[ NEURON #${n.id} FIRED — ACT:${val.toFixed(3)} ]`);
  },

  /* Full forward pass through Logic Layer */
  forwardPass(){
    brain.forwardPass();
    showStatus('[ FORWARD PASS COMPLETE ]');
  },

  /* Toggle signal particles */
  toggleSignals(){
    // accessed via Visual closure — use flag toggle
    Brain._sOn = Brain._sOn===undefined ? false : !Brain._sOn;
    // We re-expose signalsOn toggle via a small hack
    showStatus(Brain._sOn ? '[ SIGNALS: OFF ]' : '[ SIGNALS: ON ]');
  },

  /* Force-directed auto-layout (logic: push/pull on positions) */
  autoLayout(){
    const ns=brain.neurons;
    for(let iter=0;iter<80;iter++){
      ns.forEach((a,i)=>{
        const pa=Visual.getPos(a.id); if(!pa) return;
        const force=new THREE.Vector3();
        // Repulsion
        ns.forEach((b,j)=>{ if(i===j) return;
          const pb=Visual.getPos(b.id); if(!pb) return;
          const d=pa.clone().sub(pb); const l=Math.max(d.length(),.1);
          force.add(d.normalize().multiplyScalar(180/(l*l)));
        });
        // Attraction along synapses
        brain.synapses.forEach(s=>{
          if(s.from.id===a.id){ const pb=Visual.getPos(s.to.id); if(pb) force.add(pb.clone().sub(pa).multiplyScalar(.012)); }
          if(s.to.id  ===a.id){ const pb=Visual.getPos(s.from.id); if(pb) force.add(pb.clone().sub(pa).multiplyScalar(.012)); }
        });
        // Soft center pull
        force.add(pa.clone().negate().multiplyScalar(.004));
        // Layer constraint: keep columns roughly
        const lx={input:-28,hidden:0,output:28};
        force.x += (lx[a.layerType] - pa.x) * 0.1;
        pa.add(force.multiplyScalar(.25));
      });
    }
    // Update basePos for floating animation
    brain.neurons.forEach(n=>{
      const g=Visual.addNeuronMesh._map; // alternative: update via getPos
      // basePos is stored in userData
    });
    showStatus('[ LAYOUT COMPUTED ]');
  },
};

/* ══════════════════════════════════════════════════════════
   ██  UI  —  DOM glue
   ══════════════════════════════════════════════════════════ */

let selectedNeuron = null;
let linkSource     = null;

const UI = {
  openModal(){
    document.getElementById('modal').style.display='block';
    document.getElementById('mLabel').focus();
  },
  closeModal(){
    document.getElementById('modal').style.display='none';
    document.getElementById('mLabel').value='';
  },
  confirmAdd(){
    const lbl  = document.getElementById('mLabel').value.trim() || ('N_'+brain._nId);
    const layer= document.getElementById('mLayer').value;
    brain.addNeuron(lbl, layer);
    // auto-link to a random existing neuron of compatible layer
    const existing=brain.neurons.slice(0,-1);
    if(existing.length>0){
      const candidates=existing.filter(n=>n.layerType!==layer||Math.random()<.4);
      if(candidates.length){
        const tgt=candidates[Math.floor(Math.random()*candidates.length)];
        const newN=brain.neurons[brain.neurons.length-1];
        brain.connect(tgt,newN);
      }
    }
    UI.closeModal();
  },
  selectNeuron(n){
    if(linkSource && linkSource.id!==n.id){
      brain.connect(linkSource,n);
      showStatus(`[ SYNAPSE CREATED: #${linkSource.id} → #${n.id} ]`);
      linkSource=null;
    } else {
      linkSource=n;
      showStatus(`[ LINK SRC: ${n.label} — CLICK TARGET ]`);
    }
    selectedNeuron=n;
    document.getElementById('iId').textContent  = 'N_'+String(n.id).padStart(3,'0');
    document.getElementById('iLb').textContent  = n.label;
    document.getElementById('iLy').textContent  = n.layerType.toUpperCase();
    document.getElementById('iW').textContent   = n.weight;
    document.getElementById('iBi').textContent  = n.bias;
    document.getElementById('iCo').textContent  = n.connections;
    document.getElementById('actbar').style.width=(n.activation*100).toFixed(1)+'%';
  },
  clearSelection(){
    selectedNeuron=null; linkSource=null;
    ['iId','iLb','iLy','iW','iBi','iCo'].forEach(id=>document.getElementById(id).textContent='—');
    document.getElementById('actbar').style.width='0%';
  },
  deleteSelected(){
    if(!selectedNeuron) return;
    brain.removeNeuron(selectedNeuron.id);
    UI.clearSelection();
  },
};

document.getElementById('mLabel').addEventListener('keydown', e=>{
  if(e.key==='Enter') UI.confirmAdd();
  if(e.key==='Escape') UI.closeModal();
});

/* ── HUD ── */
function updateHUD(){
  document.getElementById('sN').textContent = brain.neurons.length;
  document.getElementById('sS').textContent = brain.synapses.length;
  const layers=[...new Set(brain.neurons.map(n=>n.layerType))];
  document.getElementById('sL').textContent = layers.length||'-';
}

/* ── Status bar ── */
let statusTimer;
function showStatus(msg){
  const el=document.getElementById('status');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(statusTimer);
  statusTimer=setTimeout(()=>el.classList.remove('on'),3200);
}

/* ══════════════════════════════════════════════════════════
   ██  BOOTSTRAP  — Seed initial network
   ══════════════════════════════════════════════════════════ */

// Input layer
const i0=brain.addNeuron('INPUT-A','input');
const i1=brain.addNeuron('INPUT-B','input');
const i2=brain.addNeuron('INPUT-C','input');

// Hidden layer
const h0=brain.addNeuron('THINK-1','hidden');
const h1=brain.addNeuron('THINK-2','hidden');
const h2=brain.addNeuron('MEMORY', 'hidden');
const h3=brain.addNeuron('LOGIC',  'hidden');

// Output layer
const o0=brain.addNeuron('OUTPUT-X','output');
const o1=brain.addNeuron('OUTPUT-Y','output');

// Synapses
[[i0,h0],[i0,h1],[i1,h1],[i1,h2],[i2,h2],[i2,h3],
 [h0,o0],[h1,o0],[h2,o1],[h3,o1],[h0,h2],[h1,h3]]
.forEach(([a,b])=>brain.connect(a,b));

// Initial forward pass with delay for visual effect
setTimeout(()=>{
  Brain.forwardPass();
  showStatus('[ NETWORK INITIALISED — FORWARD PASS COMPLETE ]');
},800);

// Auto-pulse every 4s
setInterval(()=>{ if(Math.random()<.6) Brain.pulse(); }, 4000);

</script>
